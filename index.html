<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LapTrans OS Premium</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* Apple-style Typography */
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap');
        
        :root {
            /* Głębokie tła OLED */
            --bg-body: #000000; 
            --bg-app: #09090b; 
            --card: #141417; 
            --card-hover: #1c1c20;
            --border: rgba(255, 255, 255, 0.1); 
            
            /* Typografia */
            --text: #ffffff; 
            --muted: #8b8b93;
            
            /* Motywy przewodnie */
            --taxi-main: #f59e0b; /* Bursztynowy Taxi */
            --taxi-grad: linear-gradient(135deg, #f59e0b, #d97706);
            --home-main: #10b981; /* Szmaragdowy Budżet */
            --home-grad: linear-gradient(135deg, #10b981, #047857);
            
            /* Statusy */
            --success: #22c55e; 
            --danger: #ef4444; 
            --warning: #f59e0b; 
            --info: #3b82f6; 
            --quote: #d946ef; 
            --fuel: #f97316;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        
        body, html { 
            background: var(--bg-body); 
            color: var(--text); 
            margin: 0; padding: 0; 
            width: 100vw; min-height: 100vh; 
            overflow-x: hidden; 
            display: flex; justify-content: center; 
        }
        
        /* === KONTENER APLIKACJI (Mobile First) === */
        .app-container { 
            width: 100%; max-width: 500px; 
            background: var(--bg-app); 
            min-height: 100vh; 
            padding-bottom: calc(120px + env(safe-area-inset-bottom)); 
            position: relative; 
            display: flex; flex-direction: column; 
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* Ambientowe, żywe tło z tyłu na PC */
        .ambient-bg { 
            position: fixed; top: 0; left: 0; right: 0; height: 60vh; 
            background: radial-gradient(circle at 50% -20%, rgba(245, 158, 11, 0.12) 0%, transparent 80%); 
            z-index: -1; pointer-events: none; transition: background 0.8s ease;
        }

        /* === ANIMACJE === */
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* === NAGŁÓWEK === */
        header { 
            padding: max(15px, env(safe-area-inset-top)) 20px 15px; 
            background: rgba(9, 9, 11, 0.85); 
            position: sticky; top: 0; z-index: 100; 
            display: flex; justify-content: space-between; align-items: center; 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); 
            border-bottom: 1px solid var(--border); 
        }
        
        .brand-logo { display: flex; align-items: center; gap: 10px; cursor: pointer; transition: 0.2s; }
        .brand-logo:active { transform: scale(0.95); }
        .logo-text { font-weight: 900; font-size: 1.3rem; letter-spacing: -0.5px; display:flex; align-items:center; gap:5px; }

        .settings-btn { 
            width: 42px; height: 42px; border-radius: 14px; 
            background: var(--card); border: 1px solid var(--border); 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; transition: 0.2s; color: var(--text); 
        }
        .settings-btn:active { transform: scale(0.9); background: var(--card-hover); }
        
        .top-badge { 
            background: var(--card); border: 1px solid var(--border); 
            padding: 8px 16px; border-radius: 16px; 
            font-weight: 800; font-size: 0.85rem; 
        }

        /* === PANELE I SEKCJE === */
        .panel { 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 28px; 
            margin: 15px; padding: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        .p-title { 
            font-size: 0.75rem; font-weight: 800; color: var(--muted); 
            text-transform: uppercase; margin-bottom: 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            letter-spacing: 1px; border-bottom: 1px solid var(--border); padding-bottom: 15px; 
        }
        
        .dash-hero { text-align: center; padding: 40px 15px 20px; }
        .dash-hero p { margin: 0 0 8px 0; font-size: 0.8rem; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; }
        .dash-hero h1 { margin: 0; font-size: clamp(3rem, 10vw, 4.5rem); font-weight: 900; letter-spacing: -2px; line-height: 1.1; }

        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 15px; margin-bottom:20px; }
        .box { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 18px; border-radius: 20px; display: flex; flex-direction: column; justify-content: center; }
        .box span { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; font-weight: 800; margin-bottom: 8px; letter-spacing: 0.5px; }
        .box strong { font-size: clamp(1.2rem, 4vw, 1.5rem); font-weight: 900; letter-spacing: -0.5px; color: #fff; }

        /* === FORMULARZE === */
        .inp-row { display: flex; gap: 12px; margin-bottom: 16px; }
        .inp-group { flex: 1; display: flex; flex-direction: column; }
        .inp-group label { font-size: 0.75rem; color: var(--muted); font-weight: 800; margin-bottom: 8px; padding-left: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .inp-group input, .inp-group select { 
            background: rgba(255,255,255,0.03); border: 1px solid var(--border); 
            color: #fff; padding: 18px 20px; border-radius: 18px; 
            font-size: 1.1rem; font-weight: 600; outline: none; transition: 0.3s; 
        }
        .inp-group input:focus, .inp-group select:focus { border-color: var(--taxi-main); background: rgba(245, 158, 11, 0.05); }
        
        .big-inp { font-size: 2.2rem !important; padding: 25px !important; font-weight: 900 !important; text-align: center !important; letter-spacing: -1px; border-radius: 24px !important; }

        /* === PRZYCISKI === */
        .btn { 
            width: 100%; padding: 22px; border-radius: 22px; border: none; 
            font-weight: 800; font-size: 1.1rem; cursor: pointer; text-transform: uppercase; 
            transition: 0.2s; letter-spacing: 1px; color: #fff; display:flex; justify-content:center; align-items:center; gap:8px;
        }
        .btn:active { transform: scale(0.96); }
        .btn-taxi { background: var(--taxi-grad); box-shadow: 0 8px 25px rgba(245, 158, 11, 0.3); } 
        .btn-home { background: var(--home-grad); box-shadow: 0 8px 25px rgba(16, 185, 129, 0.3); } 
        .btn-danger { background: linear-gradient(135deg, #ef4444, #b91c1c); box-shadow: 0 8px 25px rgba(239, 68, 68, 0.3); }

        /* === CHIPY / PRZEŁĄCZNIKI === */
        .chip-box { display: flex; gap: 10px; overflow-x: auto; margin-bottom: 15px; scrollbar-width: none; } 
        .chip-box::-webkit-scrollbar { display: none; }
        .chip { 
            padding: 16px 20px; background: rgba(255,255,255,0.03); 
            border: 1px solid var(--border); color: var(--muted); border-radius: 16px; 
            font-size: 0.95rem; font-weight: 800; cursor: pointer; white-space: nowrap; 
            flex: 1; text-align: center; transition: 0.2s; 
        }
        .chip.act-taxi { background: var(--taxi-grad); color: #fff; border-color: transparent; }
        .chip.act-succ { background: var(--home-grad); color: #fff; border-color: transparent; }

        /* === DOLNY DOCK (APPLE STYLE) === */
        .nav-dock { 
            position: fixed; bottom: calc(20px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); 
            width: calc(100% - 30px); max-width: 460px; 
            background: rgba(20, 20, 23, 0.9); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 35px; 
            display: flex; justify-content: space-around; padding: 12px; z-index: 1000; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.9); 
        }
        .nav-item { 
            color: var(--muted); text-align: center; font-size: 0.65rem; font-weight: 800; 
            cursor: pointer; flex: 1; transition: 0.3s; text-transform: uppercase; 
            display: flex; flex-direction: column; align-items: center; 
        }
        .nav-item svg { width: 24px; height: 24px; margin-bottom: 6px; stroke: var(--muted); fill: none; stroke-width: 2.2; transition: 0.3s; }
        
        .nav-item.act-t { color: #fff; }
        .nav-item.act-t svg { stroke: var(--taxi-main); transform: translateY(-4px) scale(1.1); filter: drop-shadow(0 4px 8px rgba(245,158,11,0.6)); }
        
        .nav-item.act-h { color: #fff; }
        .nav-item.act-h svg { stroke: var(--home-main); transform: translateY(-4px) scale(1.1); filter: drop-shadow(0 4px 8px rgba(16,185,129,0.6)); }
        
        /* Przycisk akcji Plus (+) na środku docku */
        .fab-wrapper { position: relative; width: 65px; display: flex; justify-content: center; }
        .fab-btn { 
            width: 70px; height: 70px; border-radius: 50%; 
            background: var(--home-grad); color: #fff; 
            display: flex; align-items: center; justify-content: center; 
            position: absolute; bottom: -5px; 
            box-shadow: 0 10px 25px rgba(16,185,129,0.5); cursor: pointer; 
            border: 6px solid var(--bg-app); transition: 0.2s; 
        }
        .fab-btn:active { transform: scale(0.9); }

        /* === WIZARD (KREATOR STARTOWY) - KLUCZOWA POPRAWKA === */
        .wiz-screen { 
            display: none; /* Domyślnie schowane */
            padding: 30px; 
            min-height: 100vh; 
            flex-direction: column; 
            justify-content: center; 
            animation: fadeIn 0.5s; 
        }
        .wiz-screen.active { 
            display: flex; /* Tylko klasa .active go pokazuje */
        } 
        
        .wiz-title { font-size: 2.8rem; font-weight: 900; margin-bottom: 10px; letter-spacing: -1.5px; text-align: center; }
        .wiz-sub { color: var(--muted); text-align: center; margin-bottom: 40px; font-size: 1.1rem; font-weight: 600; }
        
        .opt-card { 
            background: rgba(255,255,255,0.03); border: 2px solid var(--border); 
            border-radius: 28px; padding: 25px; margin-bottom: 15px; 
            cursor: pointer; display: flex; align-items: center; transition: 0.3s; 
        }
        .opt-card.selected { border-color: var(--taxi-main); background: rgba(245,158,11,0.1); box-shadow: 0 15px 35px rgba(245,158,11,0.2); }
        
        .opt-icon { 
            font-size: 2.5rem; margin-right: 20px; background: rgba(0,0,0,0.5); 
            width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; 
            border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: 0.3s;
        }
        .opt-card.selected .opt-icon { background: var(--taxi-main); color: #000 !important; }

        .premium-input { 
            background: rgba(255,255,255,0.05); border: 2px solid var(--border); 
            color: #fff; font-size: 1.8rem; font-weight: 900; text-align: center; 
            padding: 25px; border-radius: 28px; width: 100%; transition: 0.3s; 
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.3); letter-spacing: -1px; margin-bottom: 20px; outline:none;
        }
        .premium-input:focus { border-color: var(--taxi-main); background: rgba(245,158,11,0.05); }

        /* === MODALE === */
        .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; animation: fadeIn 0.3s; }
        .modal-box { background: #111113; border: 1px solid var(--border); border-radius: 36px; width: 100%; max-width: 380px; padding: 35px 25px; text-align: center; animation: slideUp 0.4s cubic-bezier(0.16,1,0.3,1); box-shadow: 0 30px 60px rgba(0,0,0,0.9); }
        @keyframes slideUp { from{opacity:0; transform:translateY(40px) scale(0.95);} to{opacity:1; transform:translateY(0) scale(1);} }

        /* === ELEMENTY WSPÓLNE === */
        .hidden { display: none !important; }
        
        .log-item { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .section-lbl { font-size: 0.8rem; color: var(--muted); font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin: 35px 20px 10px; }
        
        .fin-row { display: flex; justify-content: space-between; padding: 16px 0; border-bottom: 1px dashed var(--border); font-size: 1.05rem; align-items: center; }
        .fin-row:last-child { border-bottom: none; }
        .fin-label { color: var(--muted); font-weight: 600; }
        .fin-val { font-weight: 800; font-size: 1.2rem; }

        /* Wykresy (Doughnut i Bar) */
        .chart-wrapper { height: 260px; position: relative; margin-bottom: 25px; background: rgba(255,255,255,0.02); border-radius: 24px; padding: 15px; border: 1px solid var(--border); }
        
        /* Mapy Leaflet w Dark Mode */
        .leaflet-layer, .leaflet-control-zoom-in, .leaflet-control-zoom-out, .leaflet-control-attribution { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
        .leaflet-container { background: #000; border-radius: 24px; border: 1px solid var(--border); box-shadow: inset 0 4px 15px rgba(0,0,0,0.8); }

        /* Ikony wektorowe (Top Bar) */
        .icon-logo { width: 32px; height: 32px; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
</head>
<body>

<div class="ambient-bg" id="main-bg"></div>

<div id="app" class="app-container"></div>

<div id="m-switcher" class="modal-bg hidden">
    <div class="modal-box" style="border-top: 6px solid var(--text);">
        <div style="margin-bottom:20px; display:flex; justify-content:center;">
            <svg class="icon-logo" style="width:60px; height:60px; stroke:var(--text);" viewBox="0 0 24 24">
                <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                <polyline points="2 17 12 22 22 17"></polyline>
                <polyline points="2 12 12 17 22 12"></polyline>
            </svg>
        </div>
        <h3 style="color:#fff; margin:0 0 25px 0; font-size:1.8rem; font-weight:900;">LapTrans OS</h3>
        <div id="switcher-btns" style="display:flex; flex-direction:column; gap:15px;"></div>
        <button class="btn" style="background:transparent; border:1px solid var(--border); color:var(--muted); margin-top:20px;" onclick="window.closeSwitcher()">ZAMKNIJ</button>
    </div>
</div>

<script>
// ==========================================
// 1. ZARZĄDZANIE SYSTEMEM I BAZĄ DANYCH
// ==========================================

// Wibracje dotykowe
window.vib = function(ms = 40) { 
    if (navigator.vibrate) navigator.vibrate(ms); 
};

// Animacja odliczania pieniędzy
window.animNum = function(id, start, end, duration) { 
    let obj = document.getElementById(id); 
    if (!obj) return; 
    let startTimestamp = null; 
    const step = function(timestamp) { 
        if (!startTimestamp) startTimestamp = timestamp; 
        const progress = Math.min((timestamp - startTimestamp) / duration, 1); 
        const easeProgress = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress); 
        obj.innerHTML = (start + (end - start) * easeProgress).toFixed(2) + ' zł'; 
        if (progress < 1) requestAnimationFrame(step); 
    }; 
    requestAnimationFrame(step); 
};

// Nowy, odporny system okien modalnych
window.showModal = function(type, title, text, placeholder, callback) { 
    window.vib(); 
    let existing = document.getElementById('custom-modal-root'); 
    if (existing) existing.remove(); 
    
    let overlay = document.createElement('div'); 
    overlay.id = 'custom-modal-root'; 
    overlay.className = 'modal-bg'; 
    
    let color = 'var(--text)';
    let icon = '💬';
    
    if (type === 'success') { color = 'var(--success)'; icon = '✔️'; }
    if (type === 'error') { color = 'var(--danger)'; icon = '⚠️'; }
    if (type === 'confirm') { color = 'var(--warning)'; icon = '❓'; }
    if (type === 'prompt') { color = 'var(--info)'; icon = '✏️'; }
    
    let inputHtml = type === 'prompt' ? `<input type="text" id="modal-inp" style="width:100%; padding:20px; border-radius:16px; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:#fff; font-size:1.2rem; text-align:center; margin-bottom:20px; outline:none;" placeholder="${placeholder}">` : ''; 
    let btnConfirm = `<button class="btn" style="background:${color}; color:${type==='confirm'?'#000':'#fff'}; margin:0;" id="m-btn-ok">${type==='prompt'||type==='confirm'?'POTWIERDŹ':'ROZUMIEM'}</button>`; 
    let btnCancel = (type === 'confirm' || type === 'prompt') ? `<button class="btn" style="background:transparent; border:1px solid var(--border); color:var(--muted); margin:0;" id="m-btn-cancel">ANULUJ</button>` : ''; 
    
    overlay.innerHTML = `
    <div class="modal-box" style="border-top: 6px solid ${color};">
        <div style="font-size:3.5rem; margin-bottom:10px;">${icon}</div>
        <h3 style="color:#fff; margin:0 0 10px 0; font-size:1.6rem; font-weight:900;">${title}</h3>
        <p style="color:var(--muted); font-size:1rem; margin-bottom:25px; line-height:1.4;">${text}</p>
        ${inputHtml}
        <div style="display:flex; gap:10px;">${btnCancel}${btnConfirm}</div>
    </div>`; 
    
    document.body.appendChild(overlay); 
    
    if (type === 'prompt') setTimeout(() => document.getElementById('modal-inp').focus(), 100); 
    
    document.getElementById('m-btn-ok').onclick = function() { 
        window.vib(); 
        let val = type === 'prompt' ? document.getElementById('modal-inp').value : true; 
        overlay.remove(); 
        if (callback) callback(val); 
    }; 
    
    let cBtn = document.getElementById('m-btn-cancel'); 
    if (cBtn) cBtn.onclick = function() { 
        window.vib(); 
        overlay.remove(); 
        if (callback) callback(type === 'prompt' ? null : false); 
    }; 
};

// Struktura i Inicjalizacja Bazy Danych
const defaultDb = { 
    init: false, 
    mainProfile: null, 
    role: null, 
    tab: 'term', 
    filter: 'today', 
    userName: '', 
    drv: { 
        plat: 'apps', carType: 'rent', emp: 'partner', liveRideStart: null, 
        cfg: { fix:0, tax:0.085, fuelPx:0.5, bC:0, cC:0, cType:'month', eC:0, iC:0, eType:'flat', ePct:0, cardF:0.015, goal:350, defCity:'Szczecin', serviceOdo:0 }, 
        docs: { oc: '', tech: '' }, odo: 0, q: {s:9, w:39, t1:3.2, t2:4, t3:6.4, t4:8}, sh: {on:false, o:0, tr:[]}, h: [], exp: [], fuel: [], clients: [] 
    }, 
    home: { 
        n: 'Dom', sal: 0, fix: 0, 
        accs: [{id:'bank', n:'Konto Główne', c:'#3b82f6', i:'🏦', startBal:0}, {id:'cash', n:'Gotówka', c:'#10b981', i:'💵', startBal:0}], 
        savings: [], trans: [], planned: [], members: [], budgets: {} 
    } 
};

let db; 
try { 
    const stored = localStorage.getItem('laptrans_db_v9'); // ZMIENIONY KLUCZ dla czystego startu
    db = stored ? JSON.parse(stored) : defaultDb;
    if (!db || !db.home || !db.drv || !db.drv.cfg) db = defaultDb; 
} catch(e) { 
    db = defaultDb; 
}

// Zmienne sesyjne
let tempWizData = { p: 'apps', c: 'rent', e: 'partner', mainProfile: null }; 
let dTSrc = null, dTPay = null, dQN = false, dQV = 0, dQK = 0, dQM_T = 0; 
let hTransType = 'exp', hSelCat = null, hSelAcc = 'bank';

window.saveDb = function() {
    localStorage.setItem('laptrans_db_v9', JSON.stringify(db));
};

window.getSafeVal = function(id, fallback = 0) {
    const el = document.getElementById(id);
    return el && el.value ? (parseFloat(el.value) || fallback) : fallback;
};

// Bezpieczny, w 100% działający Twardy Reset
window.executeHardReset = function() {
    window.vib(100);
    window.showModal('confirm', 'Twardy Reset', 'Trwale usuniesz wszystkie dane (Taxi i Dom). Operacji NIE DA SIĘ cofnąć. Na pewno?', '', function(confirmed) {
        if(confirmed) {
            localStorage.removeItem('laptrans_db_v9');
            localStorage.clear(); // Opróżnia cały cache
            window.location.href = window.location.href.split('#')[0]; // Przeładowanie
        }
    });
};

window.dSessionInit = function() { 
    if(!db || !db.drv) return; 
    if(db.drv.plat === 'apps') { 
        if(!['Uber', 'Bolt', 'Prywatny'].includes(dTSrc)) dTSrc = 'Uber'; 
        if(!['Aplikacja', 'Gotówka'].includes(dTPay)) dTPay = 'Aplikacja'; 
    } else { 
        if(!['Centrala', 'Postój', 'Prywatny'].includes(dTSrc)) dTSrc = 'Centrala'; 
        if(!['Gotówka', 'Karta'].includes(dTPay)) dTPay = 'Gotówka'; 
    } 
};

// ==========================================
// 2. NAWIGACJA (SWITCHER & ROUTER)
// ==========================================

window.changeTab = function(newTab) {
    window.vib();
    db.tab = newTab;
    window.renderApp();
};

window.openSwitcher = function() { 
    window.vib(); 
    const sBtns = document.getElementById('switcher-btns');
    let btnTaxi = `<button class="btn btn-taxi" style="margin:0;" onclick="window.switchApp('drv')">🚕 Aplikacja Taxi</button>`; 
    let btnHome = `<button class="btn btn-home" style="margin:0;" onclick="window.switchApp('home')">🏠 Budżet Domowy</button>`; 
    sBtns.innerHTML = db.mainProfile === 'driver' ? btnTaxi + btnHome : btnHome + btnTaxi; 
    document.getElementById('m-switcher').classList.remove('hidden'); 
};

window.closeSwitcher = function() {
    window.vib();
    document.getElementById('m-switcher').classList.add('hidden');
};

window.switchApp = function(newRole) { 
    window.vib(60); 
    db.role = newRole; 
    db.tab = (newRole === 'drv') ? 'term' : 'dash'; 
    window.saveDb(); 
    window.closeSwitcher();

window.renderApp = function() {
    const appEl = document.getElementById('app');
    
    // Tło dla różnych modułów
    const bgEl = document.getElementById('main-bg');
    if (bgEl) {
        if (db.role === 'drv') bgEl.style.background = 'radial-gradient(circle at 50% -20%, rgba(245, 158, 11, 0.15) 0%, transparent 80%)';
        else if (db.role === 'home') bgEl.style.background = 'radial-gradient(circle at 50% -20%, rgba(16, 185, 129, 0.15) 0%, transparent 80%)';
    }

    if (!db.init) {
        appEl.innerHTML = window.generateWizardHTML();
        window.setWizScreen('w-main'); // Ważne wywołanie
    } else {
        window.dSessionInit();
        if (db.role === 'drv') {
            appEl.innerHTML = window.generateTaxiHTML();
        } else {
            appEl.innerHTML = window.generateHomeHTML();
        }
    }
    
    // Klasa animacji (uruchamiana na nowo)
    appEl.classList.remove('fade-in');
    void appEl.offsetWidth;
    appEl.classList.add('fade-in');

    // Animowane liczniki i wykresy odpalane po zbudowaniu DOM
    setTimeout(() => {
        if(document.getElementById('anim-bal')) { 
            let b = window.hGetBal(); 
            window.animNum('anim-bal', 0, Object.values(b).reduce((a,x)=>a+x,0), 1200); 
        }
        if(document.getElementById('anim-net')) { 
            let g = 0, cf = 0; 
            if(db.drv.sh.on) { 
                db.drv.sh.tr.forEach(x => { g += x.v; if(x.p === 'Karta') cf += x.v * db.drv.cfg.cardF; }); 
            } 
            let pFee = db.drv.cfg.eType === 'pct' ? g * db.drv.cfg.ePct : 0; 
            window.animNum('anim-net', 0, g - (g*db.drv.cfg.tax) - pFee - cf - db.drv.cfg.fix, 1200); 
        }
    }, 100);
};

// Funkcje obsługi Kreatora
window.setWizScreen = function(id) {
    window.vib();
    document.querySelectorAll('.wiz-screen').forEach(el => {
        el.classList.remove('active');
    });
    const target = document.getElementById(id);
    if (target) {
        target.classList.add('active');
    }
    window.scrollTo(0,0);
};

window.setMainProfile = function(profile) {
    window.vib();
    tempWizData.mainProfile = profile;
    window.setWizScreen(profile === 'driver' ? 'w-d1' : 'w-home');
};

window.selectTaxiOption = function(category, value, element) {
    window.vib();
    tempWizData[category] = value;
    
    // Reset Stylów Grup
    element.parentElement.querySelectorAll('.w-opt-card').forEach(el => {
        el.classList.remove('selected');
        el.style.borderColor = 'var(--border)';
        const icon = el.querySelector('.opt-icon');
        if (icon) {
            icon.style.background = 'rgba(255,255,255,0.1)';
            icon.style.color = 'var(--text)';
        }
    });
    
    element.classList.add('selected');
    element.style.borderColor = 'var(--taxi-main)';
    const selectedIcon = element.querySelector('.opt-icon');
    if (selectedIcon) {
        selectedIcon.style.background = 'var(--taxi-main)';
        selectedIcon.style.color = '#000';
    }

    if (category === 'p') { document.getElementById('wd-b').classList.toggle('hidden', value !== 'corp'); } 
    if (category === 'c') { document.getElementById('wd-c').classList.toggle('hidden', value === 'own'); } 
    if (category === 'e') { 
        document.getElementById('wd-e-p').classList.toggle('hidden', value !== 'partner'); 
        document.getElementById('wd-e-j').classList.toggle('hidden', value !== 'jdg'); 
    }
};

window.togglePartnerType = function() {
    let val = document.getElementById('wd-p-type').value;
    document.getElementById('wd-p-flat-box').classList.toggle('hidden', val !== 'flat');
    document.getElementById('wd-p-pct-box').classList.toggle('hidden', val !== 'pct');
};

window.finishTaxiWizard = function() {
    window.vib(100);
    db.mainProfile = tempWizData.mainProfile;
    let n = document.getElementById('w-name').value;
    db.userName = n ? n : 'Kierowca';
    
    db.drv.plat = tempWizData.p;
    db.drv.carType = tempWizData.c;
    db.drv.emp = tempWizData.e;

    let b = tempWizData.p === 'corp' ? window.getSafeVal('wd-b-v') : 0;
    let c = tempWizData.c === 'own' ? 0 : window.getSafeVal('wd-c-v');
    let cType = tempWizData.c === 'own' ? 'month' : document.getElementById('wd-c-type').value;
    let i = window.getSafeVal('wd-i-v');
    
    let e = 0, eTy = 'flat', ePct = 0;
    if (tempWizData.e === 'partner') {
        eTy = document.getElementById('wd-p-type').value;
        if(eTy === 'flat') e = window.getSafeVal('wd-p-v');
        else ePct = window.getSafeVal('wd-p-pct') / 100;
    } else {
        e = window.getSafeVal('wd-j-z');
    }

    db.drv.cfg.bC = b;
    db.drv.cfg.cC = c;
    db.drv.cfg.cType = cType;
    db.drv.cfg.eC = e;
    db.drv.cfg.iC = i;
    db.drv.cfg.eType = eTy;
    db.drv.cfg.ePct = ePct;
    db.drv.cfg.tax = window.getSafeVal('wd-tx-v', 8.5) / 100;

    let dailyCar = (cType === 'week') ? (c / 7) : (c / 30);
    let dailyOther = (b + e + i) / 30;
    db.drv.cfg.fix = dailyCar + dailyOther;

    db.role = 'drv';
    db.tab = 'term';
    db.init = true;
    window.saveDb();
    window.renderApp();
};

window.finishHomeWizard = function() {
    window.vib(100);
    db.mainProfile = tempWizData.mainProfile;
    let n = document.getElementById('w-name').value;
    db.userName = n ? n : 'Domownik';
    
    db.home.sal = window.getSafeVal('wh-sal');
    db.home.fix = window.getSafeVal('wh-fix');
    db.home.members = [db.userName];
    
    db.role = 'home';
    db.tab = 'dash';
    db.init = true;
    window.saveDb();
    window.renderApp();
};

window.hGetBal = function() { 
    let b = {}; 
    db.home.accs.forEach(a => b[a.id] = a.startBal || 0); 
    db.home.trans.forEach(x => { 
        if(x.type === 'inc' && b[x.acc] !== undefined) b[x.acc] += x.v; 
        if(x.type === 'exp' && b[x.acc] !== undefined) b[x.acc] -= x.v; 
        if(x.type === 'transfer'){ 
            if(b[x.fromAcc] !== undefined) b[x.fromAcc] -= x.v; 
            if(b[x.toAcc] !== undefined) b[x.toAcc] += x.v; 
        } 
    }); 
    return b; 
};

        let d = new Date(x.rD); 
        if(d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear()) { 
            if(x.type === 'exp') { currExp += x.v; if(x.v > maxExp) maxExp = x.v; } 
            if(x.type === 'inc') currInc += x.v; 
        } 
    });
    
    let daysLeft = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate() - now.getDate() + 1;
    let safeDaily = h.sal > 0 ? Math.max((h.sal - h.fix - currExp) / daysLeft, 0) : 0;

    if(t === 'dash') { 
        return hdr + `
        <div class="dash-hero" style="padding-bottom:10px;">
            <p>Łączne Saldo</p>
            <h1 id="anim-bal" style="color:#fff;">0.00 zł</h1>
            <div style="display:flex; justify-content:center; gap:15px; margin-top:25px;">
                <div style="background:rgba(16,185,129,0.15); padding:10px 18px; border-radius:16px; color:var(--success); font-weight:800; border:1px solid rgba(16,185,129,0.3);">+${currInc.toFixed(0)} zł</div>
                <div style="background:rgba(239,68,68,0.15); padding:10px 18px; border-radius:16px; color:var(--danger); font-weight:800; border:1px solid rgba(239,68,68,0.3);">-${currExp.toFixed(0)} zł</div>
            </div>
            ${h.sal > 0 ? `<div style="margin-top:25px; padding-top:20px; border-top:1px dashed var(--border);"><span style="color:var(--muted); font-size:0.8rem; text-transform:uppercase; font-weight:800;">Bezpieczny limit na dziś</span><br><strong style="color:var(--home-main); font-size:1.8rem;">${safeDaily.toFixed(0)} zł</strong></div>` : ''}
        </div>
        
        <div class="section-lbl">Twoje Portfele</div>
        <div class="h-scroll">
            ${h.accs.map(a => `
            <div class="swipe-card" onclick="window.changeTab('acc')">
                <div style="font-size:2.5rem; margin-bottom:15px;">${a.i}</div>
                <div style="color:var(--muted); font-size:0.75rem; text-transform:uppercase; font-weight:800; margin-bottom:5px;">${a.n}</div>
                <div style="font-size:1.8rem; font-weight:900; color:#fff; letter-spacing:-1px;">${balances[a.id].toFixed(2)} <span style="font-size:1.2rem; color:var(--muted)">zł</span></div>
            </div>`).join('')}
            <div class="swipe-card" style="display:flex; justify-content:center; align-items:center; background:rgba(255,255,255,0.02); min-width:100px; border:1px dashed var(--border); cursor:pointer;" onclick="window.changeTab('acc')">
                <span style="font-size:2.5rem; color:var(--muted)">+</span>
            </div>
        </div>

        <div class="section-lbl">Ostatnia Aktywność</div>
        <div style="padding:0 15px;">
            ${[...h.trans].sort((a,b)=>new Date(b.rD)-new Date(a.rD)).slice(0,6).map(x => { 
                let isExp = x.type==='exp'; 
                let isTrans = x.type==='transfer'; 
                let cd = isExp ? C_EXP[x.cat]||{c:'#ef4444',i:'💸'} : (isTrans ? {c:'#8b5cf6',i:'🔄'} : C_INC[x.cat]||{c:'#22c55e',i:'💵'}); 
                let accN = isTrans ? `Z: ${h.accs.find(a=>a.id===x.fromAcc)?.n}` : (h.accs.find(a=>a.id===x.acc)?.n||'Konto'); 
                return `
                <div class="log-item">
                    <div style="display:flex; align-items:center; gap:15px;">
                        <div style="width:45px; height:45px; border-radius:14px; background:${cd.c}22; display:flex; align-items:center; justify-content:center; font-size:1.5rem; border:1px solid ${cd.c}55;">${cd.i}</div>
                        <div><strong style="font-size:1.1rem; color:#fff;">${isTrans?'Przelew':x.cat}</strong><br><small style="color:var(--muted);">${accN} • ${x.dt}</small></div>
                    </div>
                    <strong style="color:${isExp?'#fff':'var(--success)'}; font-size:1.3rem;">${isExp?'-':(isTrans?'':'+')}${x.v.toFixed(0)} zł</strong>
                </div>`; 
            }).join('') || `<div style="text-align:center; padding:30px; color:var(--muted);">Cisza na koncie. Dodaj pierwszą transakcję!</div>`}
        </div>` + nav; 
    } 
    
    if(t === 'save') {
        return hdr + `
        <div class="dash-hero" style="padding-bottom:10px;">
            <p>CELE OSZCZĘDNOŚCIOWE</p>
            <h1 style="color:var(--home-main)">Skarbonki</h1>
        </div>
        <div style="padding: 0 15px;">
            ${h.savings.map(s => { 
                let pct = Math.min((s.saved / s.goal) * 100, 100); 
                return `
                <div class="panel" style="padding:25px; margin:0 0 15px 0;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:15px; align-items:flex-end;">
                        <div><strong style="font-size:1.3rem; color:#fff;">${s.name}</strong><br><small style="color:var(--muted)">Zebrano: <strong style="color:var(--home-main)">${s.saved} zł</strong> / ${s.goal} zł</small></div>
                        <strong style="font-size:1.8rem; color:#fff; letter-spacing:-1px;">${pct.toFixed(0)}%</strong>
                    </div>
                    <div class="progress-bg"><div class="progress-fill" style="width:${pct}%; background:var(--home-main);"></div></div>
                    <div style="display:flex; gap:10px; margin-top:25px;">
                        <button class="btn" style="background:rgba(16,185,129,0.15); color:var(--home-main); font-size:0.9rem; padding:15px; box-shadow:none;" onclick="window.homeAddSave('${s.id}')">Wpłać</button>
                        <button class="btn" style="background:rgba(239,68,68,0.15); color:var(--danger); font-size:0.9rem; padding:15px; box-shadow:none; flex:0.4;" onclick="window.homeDelSave('${s.id}')">Usuń</button>
                    </div>
                </div>`; 
            }).join('') || '<div style="text-align:center; color:var(--muted); padding:30px;">Brak celów oszczędnościowych.</div>'}
            <button class="btn btn-home" style="margin-top:10px;" onclick="window.homeNewSave()">+ UTWÓRZ SKARBONKĘ</button>
        </div>` + nav;
    }
    
    if(t === 'add') { 
        let isExp = window.hTransType === 'exp'; 
        let isTrans = window.hTransType === 'transfer'; 
        let col = isExp ? 'var(--danger)' : (isTrans ? 'var(--info)' : 'var(--success)'); 
        let catSrc = isExp ? C_EXP : C_INC; 
        if(!isTrans && (!window.hSelCat || !catSrc[window.hSelCat])) window.hSelCat = Object.keys(catSrc)[0]; 
        let accOptions = h.accs.map(a => `<option value="${a.id}">${a.n} (${balances[a.id].toFixed(0)} zł)</option>`).join(''); 
        
        return hdr + `
        <div style="padding:20px 15px;">
            <div class="mode-switch">
                <div class="m-btn ${isExp?'active':''}" style="${isExp?'background:var(--danger);color:#fff;':''}" onclick="window.setHomeAddType('exp')">WYDATEK</div>
                <div class="m-btn ${!isExp&&!isTrans?'active':''}" style="${!isExp&&!isTrans?'background:var(--success);color:#fff;':''}" onclick="window.setHomeAddType('inc')">WPŁYW</div>
                <div class="m-btn ${isTrans?'active':''}" style="${isTrans?'background:var(--info);color:#fff;':''}" onclick="window.setHomeAddType('transfer')">PRZELEW</div>
            </div>
            
            <div style="text-align:center; padding:30px 0 40px;">
                <input type="number" id="h-v" style="background:transparent; border:none; border-bottom:3px solid ${col}; color:#fff; font-size:5rem!important; font-weight:900; text-align:center; width:250px; outline:none;" placeholder="0">
                <span style="font-size:2.5rem; font-weight:900; color:${col};">zł</span>
            </div>
            
            ${isTrans ? `
            <div class="inp-group" style="margin-bottom:20px;"><label>Z konta (Wypływ)</label><select id="h-acc-from">${accOptions}</select></div>
            <div class="inp-group" style="margin-bottom:20px;"><label>Na konto (Wpływ)</label><select id="h-acc-to">${accOptions}</select></div>
            ` : `
            <div class="inp-group" style="margin-bottom:25px;"><label>Z konta</label><select id="h-acc" onchange="window.hSelAcc=this.value">${accOptions}</select></div>
            <div class="cat-grid">
                ${Object.keys(catSrc).map(k=>`<div class="cat-item ${window.hSelCat===k?'active':''}" onclick="window.setHomeCat('${k}')" style="${window.hSelCat===k?`background:${catSrc[k].c}22; border-color:${catSrc[k].c};`:''}"><span class="cat-icon">${catSrc[k].i}</span><span class="cat-lbl">${k}</span></div>`).join('')}
            </div>
            `}
            <div class="inp-group" style="margin-bottom:15px;"><label>Krótki Opis</label><input type="text" id="h-d" placeholder="np. Zakupy weekendowe"></div>
            <button class="btn" style="background:${col}; color:#fff; margin-top:20px;" onclick="window.executeHomeTrans()">${isTrans?'WYKONAJ PRZELEW':'DODAJ TRANSAKCJĘ'}</button>
        </div>` + nav; 
    } 
    
    if(t === 'stats') { 
        let cats = {}; let sum = 0; let dailyE = {};
        
        h.trans.forEach(x => { 
            let d = new Date(x.rD); 
            if(x.type === 'exp' && d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear()) { 
                if(!cats[x.cat]) cats[x.cat] = 0; 
                cats[x.cat] += x.v; sum += x.v; 
                let dStr = d.getDate(); 
                dailyE[dStr] = (dailyE[dStr]||0) + x.v; 
            } 
        }); 
        
        let sortedCats = Object.keys(cats).sort((a,b) => cats[b] - cats[a]); 
        let cLabels = sortedCats; let cData = sortedCats.map(k => cats[k]); let cColors = sortedCats.map(k => C_EXP[k] ? C_EXP[k].c : '#8b5cf6'); 
        let bL = Object.keys(dailyE).sort((a,b)=>a-b); let bD = bL.map(k=>dailyE[k]);
        
        let catListHtml = sortedCats.map((lbl, idx) => { 
            let val = cData[idx]; let pct = sum > 0 ? ((val / sum) * 100).toFixed(0) : 0; 
            let color = cColors[idx]; let icon = C_EXP[lbl] ? C_EXP[lbl].i : '📦'; 
            return `<div style="display:flex; justify-content:space-between; align-items:center; padding:15px 0; border-bottom:1px solid rgba(255,255,255,0.05);"><div style="display:flex; align-items:center;"><div style="width:40px; height:40px; border-radius:14px; background:${color}22; display:flex; align-items:center; justify-content:center; margin-right:15px; font-size:1.3rem; border:1px solid ${color}55;">${icon}</div><span style="font-weight:800;">${lbl}</span></div><div style="display:flex; align-items:center;"><span style="color:var(--muted); font-size:0.85rem; margin-right:12px; font-weight:800;">${pct}%</span><span style="color:${color}; font-weight:900; font-size:1.1rem;">-${val.toFixed(2)} zł</span></div></div>`; 
        }).join(''); 
        
        setTimeout(() => { 
            if(sum > 0) { 
                if(window.hCh) window.hCh.destroy(); 
                window.hCh = new Chart(document.getElementById('h-chart').getContext('2d'), { type: 'doughnut', data: { labels: cLabels, datasets: [{ data: cData, backgroundColor: cColors, borderWidth: 0, hoverOffset: 6 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, cutout: '75%' } }); 
                
                if(window.hBCh) window.hBCh.destroy();
                window.hBCh = new Chart(document.getElementById('hb-chart').getContext('2d'), { type: 'bar', data: { labels: bL, datasets: [{ label: 'Wydatki (zł)', data: bD, backgroundColor: '#ef4444', borderRadius: 5 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#a1a1aa' } } } } });
            } 
        }, 100); 
        
        return hdr + `
        <div class="dash-hero" style="padding-bottom:10px;">
            <p>WYDATKI W TYM MIESIĄCU</p>
            <h1 style="color:var(--danger);">${sum.toFixed(2)} zł</h1>
        </div>
        <div class="grid-2">
            <div class="box"><span style="color:var(--info)">Średnio dziennie</span><strong>${(sum/now.getDate()).toFixed(0)} zł</strong></div>
            <div class="box"><span style="color:var(--danger)">Najdroższy zakup</span><strong>${maxExp.toFixed(0)} zł</strong></div>
        </div>
        <div class="panel">
            <div class="p-title">Wydatki po dniach</div>
            <div class="chart-wrapper"><canvas id="hb-chart"></canvas>${sum===0?'<div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:var(--muted); font-weight:800;">Brak danych</div>':''}</div>
            <div class="p-title" style="margin-top:30px;">Podział Kategorii</div>
            <div class="chart-wrapper"><canvas id="h-chart"></canvas>${sum===0?'<div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:var(--muted); font-weight:800;">Brak danych</div>':''}</div>
            <div>${catListHtml || '<div style="text-align:center; color:var(--muted); padding:10px;">Brak wydatków w tym miesiącu.</div>'}</div>
        </div>` + nav; 
    } 
    
    if(t === 'cal') { 
        let groups = {}; 
        h.trans.sort((a,b) => new Date(b.rD) - new Date(a.rD)).forEach(x => { if(!groups[x.dt]) groups[x.dt] = []; groups[x.dt].push(x); }); 
        
        let calHtml = Object.keys(groups).map(date => { 
            let dayTrans = groups[date]; 
            let dayExp = dayTrans.filter(x=>x.type==='exp').reduce((a,b)=>a+b.v, 0); 
            let dayInc = dayTrans.filter(x=>x.type==='inc').reduce((a,b)=>a+b.v, 0); 
            let itemsHtml = dayTrans.map(x => { 
                let isExp = x.type === 'exp'; let isTrans = x.type === 'transfer'; 
                let cd = isExp ? (C_EXP[x.cat] || {c:'#ef4444',i:'💸'}) : (isTrans ? {c:'#8b5cf6',i:'🔄'} : (C_INC[x.cat] || {c:'#22c55e',i:'💵'})); 
                let accName = isTrans ? `${h.accs.find(a=>a.id===x.fromAcc)?.n} -> ${h.accs.find(a=>a.id===x.toAcc)?.n}` : (h.accs.find(a=>a.id===x.acc)?.n || 'Konto'); 
                return `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:15px 0; border-bottom:1px solid rgba(255,255,255,0.05);">
                    <div style="display:flex; align-items:center; gap:15px;">
                        <div style="width:45px; height:45px; border-radius:14px; background:${cd.c}22; display:flex; align-items:center; justify-content:center; font-size:1.5rem; border:1px solid ${cd.c}55;">${cd.i}</div>
                        <div><span style="color:#fff; font-size:1rem; font-weight:800;">${isTrans?'Przelew':x.cat}</span><br><small style="color:var(--muted);">${accName} ${x.d ? '• '+x.d : ''}</small></div>
                    </div>
                    <strong style="color:${isExp?'var(--danger)':(isTrans?'#fff':'var(--success)')}; font-weight:900; font-size:1.1rem;">${isExp?'-':(isTrans?'':'+')}${x.v.toFixed(2)} zł</strong>
                </div>`; 
            }).join(''); 
            
            return `
            <div style="padding:15px; margin-top:20px; font-size:0.85rem; color:var(--muted); font-weight:900; text-transform:uppercase; display:flex; justify-content:space-between;">
                <span>${date}</span> 
                <span><span style="color:var(--success)">+${dayInc.toFixed(0)}</span> <span style="color:var(--border); margin:0 8px;">|</span> <span style="color:var(--danger)">-${dayExp.toFixed(0)}</span></span>
            </div>
            <div class="panel" style="margin-top:0; padding:5px 20px;">${itemsHtml}</div>`; 
        }).join(''); 
        
        return hdr + `
        <div class="dash-hero" style="padding-bottom:5px;">
            <p>HISTORIA TRANSAKCJI</p>
            <h1>Kalendarz</h1>
        </div>
        <div style="padding:0 10px;">${calHtml || '<div style="text-align:center; color:var(--muted); padding:30px;">Brak historii transakcji.</div>'}</div>` + nav; 
    }
    
    if(t === 'acc') {
        return hdr + `
        <div class="dash-hero" style="padding-bottom:10px;"><p>ZARZĄDZANIE KONTAMI</p><h1 style="color:#fff;">${globalBalance.toFixed(2)} zł</h1></div>
        <div style="padding: 0 15px;">
            ${h.accs.map(a => `
            <div class="panel" style="border-left:6px solid ${a.c}; margin:0 0 15px 0;">
                <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px dashed rgba(255,255,255,0.1); padding-bottom:15px; margin-bottom:15px;">
                    <div style="display:flex; align-items:center; gap:15px;"><div style="font-size:2.5rem;">${a.i}</div><div><strong style="font-size:1.3rem; font-weight:900;">${a.n}</strong><br><small style="color:var(--muted)">Bieżące saldo</small></div></div>
                    <strong style="color:${balances[a.id]>=0?'#fff':'var(--danger)'}; font-size:1.6rem; letter-spacing:-1px;">${balances[a.id].toFixed(2)} zł</strong>
                </div>
                <div class="inp-row" style="margin-bottom:0;">
                    <div class="inp-group"><label>Edytuj Nazwę</label><input type="text" id="edit_n_${a.id}" value="${a.n}"></div>
                    <div class="inp-group"><label>Saldo startowe (zł)</label><input type="number" id="edit_b_${a.id}" value="${a.startBal||0}"></div>
                </div>
                <div style="display:flex; gap:10px; margin-top:15px;">
                    <button class="btn btn-home" style="padding:15px; font-size:0.9rem; border-radius:16px; box-shadow:none;" onclick="window.homeSaveAcc('${a.id}')">ZAPISZ</button>
                    <button class="btn btn-danger" style="padding:15px; font-size:0.9rem; border-radius:16px; box-shadow:none; flex:0.4;" onclick="window.homeDelAcc('${a.id}')">USUŃ</button>
                </div>
            </div>`).join('')}
            <button class="btn" style="background:rgba(255,255,255,0.05); color:#fff; border:1px dashed var(--border); margin-top:10px; box-shadow:none;" onclick="window.homeAddNewAcc()">+ NOWE KONTO</button>
        </div>` + nav;
    }
    
    if(t === 'set') {
        return hdr + `
        <div class="dash-hero" style="padding-bottom:10px;"><p>USTAWIENIA BUDŻETU</p><h1>Opcje</h1></div>
        <div class="section-lbl">👨‍👩‍👦 Zarządzaj Rodziną</div>
        <div class="panel">
            <div class="inp-row" style="align-items:flex-end;">
                <div class="inp-group" style="flex:2"><label>Dodaj osobę</label><input type="text" id="h-new-mem" placeholder="Imię domownika"></div>
                <button class="btn" style="background:var(--home-main); color:#fff; width:auto; margin-top:0; padding:22px 25px; box-shadow:0 10px 30px rgba(16,185,129,0.4);" onclick="window.homeAddMem()">DODAJ</button>
            </div>
            <div style="margin-top:20px;">
                ${h.members.map(m => `<div style="display:inline-flex; align-items:center; background:rgba(255,255,255,0.05); margin:5px 8px 5px 0; padding:12px 18px; border-radius:16px; font-weight:800; font-size:1rem; border:1px solid rgba(255,255,255,0.1);">${m} <span style="color:var(--danger); cursor:pointer; margin-left:12px; font-size:1.2rem;" onclick="window.homeDelMem('${m}')">✖</span></div>`).join('')}
            </div>
        </div>
        <div class="section-lbl" style="color:var(--danger);">⚠️ Strefa Niebezpieczna</div>
        <div class="panel" style="border-color:rgba(239,68,68,0.4);">
            <button class="btn btn-danger" style="background:rgba(239,68,68,0.15); color:var(--danger); border:none; box-shadow:none;" onclick="window.executeHardReset()">TWARDY RESET BAZY DANYCH</button>
            <p style="color:var(--muted); font-size:0.8rem; text-align:center; margin-top:15px;">Uwaga: Przycisk trwale usunie wszystkie dane zapisane w aplikacji (łącznie z Taxi).</p>
        </div>` + nav; 
    }
};

window.setHomeAddType = function(t) { window.vib(); window.hTransType = t; window.renderApp(); };
window.setHomeCat = function(c) { window.vib(); window.hSelCat = c; window.renderApp(); };

window.generateTaxiHTML = function() {
    let d = db.drv; 
    let t = db.tab;
    
    let nav = `
    <div class="nav-dock">
        <div class="nav-item ${t==='term'?'act-t':''}" onclick="window.changeTab('term')">${I.taxi}Panel</div>
        <div class="nav-item ${t==='quote'?'act-t':''}" onclick="window.changeTab('quote')">${I.map}Mapa</div>
        <div class="nav-item ${t==='garage'?'act-t':''}" onclick="window.changeTab('garage')">${I.garage}Garaż</div>
        <div class="nav-item ${t==='stats'?'act-t':''}" onclick="window.changeTab('stats')">${I.stats}Wyniki</div>
        <div class="nav-item ${t==='crm'?'active':''}" onclick="window.changeTab('crm')">${I.users}Klienci</div>
    </div>`;
    
    let hdr = `
    <header>
        <div class="brand-logo" onclick="window.openSwitcher()">
            <svg class="icon-logo" style="stroke:var(--taxi-main);" viewBox="0 0 24 24"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
            <div class="logo-text">LapTrans <span style="font-weight:400;color:var(--muted)">Taxi</span><span class="logo-arrow">⏷</span></div>
        </div>
        <div class="header-actions" style="display:flex; align-items:center; gap:10px;">
            <div class="top-badge" style="color:var(--taxi-main);">ODO: ${d.odo}</div>
            <button class="settings-btn" onclick="window.changeTab('set')">${I.set}</button>
        </div>
    </header>`;

    // Alerty Garażowe
    let alertsHtml = '';
    if(d.cfg.serviceOdo && d.odo > 0) { 
        let diff = d.cfg.serviceOdo - d.odo; 
        if(diff <= 1000 && diff > 0) alertsHtml += `<div style="background:rgba(245,158,11,0.15); border:1px solid var(--warning); border-radius:24px; padding:20px; margin:0 15px 20px; color:var(--warning); display:flex; align-items:center; gap:15px;"><div style="font-size:2.5rem; animation: pulse 2s infinite;">⚠️</div><div><strong style="font-size:1.1rem;">Zbliża się serwis!</strong><br><small style="color:var(--text)">Wymiana oleju za ${diff} km.</small></div></div>`; 
        else if(diff <= 0) alertsHtml += `<div style="background:rgba(239,68,68,0.15); border:1px solid var(--danger); border-radius:24px; padding:20px; margin:0 15px 20px; color:var(--danger); display:flex; align-items:center; gap:15px;"><div style="font-size:2.5rem;">🚨</div><div><strong style="font-size:1.1rem;">WYMAGANY SERWIS!</strong><br><small style="color:var(--text)">Przekroczono limit o ${Math.abs(diff)} km.</small></div></div>`; 
    }
    if(d.docs.oc) { 
        let days = Math.ceil((new Date(d.docs.oc) - new Date()) / (1000*60*60*24)); 
        if(days <= 14 && days >= 0) alertsHtml += `<div style="background:rgba(239,68,68,0.15); border:1px solid var(--danger); border-radius:24px; padding:20px; margin:0 15px 20px; color:var(--danger); display:flex; align-items:center; gap:15px;"><div style="font-size:2.5rem;">📄</div><div><strong style="font-size:1.1rem;">Koniec Ubezpieczenia OC</strong><br><small style="color:var(--text)">Pozostało tylko ${days} dni!</small></div></div>`; 
    }

    if(t === 'term') { 
        let isApp = d.plat === 'apps';
        let ch1 = isApp ? 
            `<div class="chip ${dTSrc==='Uber'?'act-taxi':''}" onclick="window.setTaxiSource('Uber',this)">Uber</div><div class="chip ${dTSrc==='Bolt'?'act-taxi':''}" onclick="window.setTaxiSource('Bolt',this)">Bolt</div><div class="chip ${dTSrc==='Prywatny'?'act-taxi':''}" onclick="window.setTaxiSource('Prywatny',this)">Prywatny</div>` : 
            `<div class="chip ${dTSrc==='Centrala'?'act-taxi':''}" onclick="window.setTaxiSource('Centrala',this)">Centrala</div><div class="chip ${dTSrc==='Postój'?'act-taxi':''}" onclick="window.setTaxiSource('Postój',this)">Postój</div><div class="chip ${dTSrc==='Prywatny'?'act-taxi':''}" onclick="window.setTaxiSource('Prywatny',this)">Prywatny</div>`;
        let ch2 = isApp ? 
            `<div class="chip ${dTPay==='Aplikacja'?'act-taxi':''}" onclick="window.setTaxiPayment('Aplikacja',this)">Aplikacja</div><div class="chip ${dTPay==='Gotówka'?'act-succ':''}" onclick="window.setTaxiPayment('Gotówka',this)">Gotówka</div>` : 
            `<div class="chip ${dTPay==='Gotówka'?'act-succ':''}" onclick="window.setTaxiPayment('Gotówka',this)">Gotówka</div><div class="chip ${dTPay==='Karta'?'act-taxi':''}" onclick="window.setTaxiPayment('Karta',this)">Karta</div>`;
        let clientOpts = d.clients.map(c => `<option value="${c.id}">${c.n}</option>`).join('');

        let g = 0, cf = 0; 
        if(d.sh.on) { d.sh.tr.forEach(x=>{ g+=x.v; if(x.p==='Karta') cf+=x.v*d.cfg.cardF; }); }
        let pFee = d.cfg.eType === 'pct' ? g * d.cfg.ePct : 0; 
        let n = g - (g*d.cfg.tax) - pFee - cf - d.cfg.fix; 

        let stoperHtml = '';
        if(d.sh.on) {
            if(d.liveRideStart) {
                stoperHtml = `<div class="panel" style="border-color:var(--danger); text-align:center; background:linear-gradient(145deg, rgba(239,68,68,0.1), var(--card)); padding:30px 20px;"><div style="font-size:3.5rem; margin-bottom:10px; animation: pulse 2s infinite;">⏳</div><h3 style="color:var(--danger); margin:0 0 5px 0; text-transform:uppercase; letter-spacing:1px; font-weight:900;">Kurs w toku!</h3><p style="color:var(--muted); font-size:0.85rem; margin-bottom:20px;">Stoper działa w tle.</p><button class="btn btn-danger" style="font-size:1.1rem; padding:20px;" onclick="window.stopLiveRide()">🔴 ZAKOŃCZ KURS</button></div>`;
            } else {
                stoperHtml = `<div class="panel" style="border-color:var(--success); text-align:center; background:linear-gradient(145deg, rgba(34,197,94,0.05), var(--card));"><button class="btn btn-success" style="color:#fff; font-size:1.15rem; padding:25px;" onclick="window.startLiveRide()">🟢 ROZPOCZNIJ KURS (STOPER)</button><p style="color:var(--muted); font-size:0.75rem; margin-top:15px; text-transform:uppercase; font-weight:800;">Kliknij, gdy klient wsiądzie</p></div>`;
            }
        }

        let act = d.sh.on ? `
        ${alertsHtml}
        <div class="dash-hero" style="padding-top:10px; padding-bottom:0;">
            <p>BIEŻĄCY ZYSK NETTO</p>
            <h1 id="anim-net" style="font-size:clamp(3.5rem, 12vw, 4.5rem); color:${n>=0?'var(--success)':'var(--danger)'};">0.00 zł</h1>
        </div>
        <div class="grid-responsive">
            <div class="panel" style="border-color:rgba(245, 158, 11, 0.3);">
                <div class="p-title" style="color:var(--taxi-main);">➕ Nowy kurs</div>
                <div class="chip-box">${ch1}</div>
                <div class="chip-box" style="margin-bottom:0;">${ch2}</div>
                ${!isApp ? `<div class="inp-group" style="margin-top:15px; margin-bottom:15px;"><label>Klient VIP (Rabat)</label><select id="dt-cid"><option value="">-- Zwykły kurs --</option>${clientOpts}</select></div>` : ''}
                <div style="background:rgba(0,0,0,0.4); border-radius:24px; padding:20px; border:1px solid rgba(255,255,255,0.05); margin-bottom:20px; margin-top:15px; text-align:center;">
                    <div style="font-size:0.75rem; color:var(--muted); text-transform:uppercase; font-weight:800; margin-bottom:10px;">Kwota Brutto</div>
                    <div style="display:flex; justify-content:center; align-items:center; gap:10px;">
                        <input type="number" id="dt-v" style="background:transparent; border:none; border-bottom:3px solid var(--taxi-main); color:#fff; font-size:4rem; font-weight:900; text-align:center; width:200px; outline:none; padding:0;" placeholder="0">
                        <span style="font-size:2.5rem; font-weight:900; color:var(--taxi-main);">zł</span>
                    </div>
                </div>
                <div class="inp-row">
                    <div class="inp-group"><label>Czas (Min)</label><input type="number" id="dt-m" placeholder="np. 15"></div>
                    <div class="inp-group"><label>KM</label><input type="number" id="dt-k" placeholder="np. 8.5"></div>
                </div>
                <button class="btn btn-taxi" style="margin-top:10px;" onclick="window.addTaxiRide()">DODAJ DO PORTFELA</button>
            </div>
            <div>
                ${stoperHtml}
                <div class="section-lbl" style="margin-top:10px;">Ostatnie Przejazdy</div>
                <div style="padding:0 15px;">
                    ${d.sh.tr.slice(0,5).map(x=>`
                    <div class="log-item" style="border-left:5px solid var(--taxi-main); padding:15px;">
                        <div style="display:flex; align-items:center; gap:15px;">
                            <div style="font-size:1.6rem; background:rgba(255,255,255,0.05); padding:12px; border-radius:16px;">${x.p==='Gotówka'?'💵':'📱'}</div>
                            <div><strong style="font-size:1.2rem; color:#fff;">${x.v.toFixed(2)} zł</strong><br><small style="color:var(--muted);">${x.s} • ${x.k||0}km</small></div>
                        </div>
                        <span style="color:var(--danger); font-size:1.5rem; cursor:pointer; padding:5px;" onclick="window.deleteTaxiRide(${x.id})">✖</span>
                    </div>`).join('') || '<div style="text-align:center; color:var(--muted); padding:20px;">Brak kursów na tej zmianie.</div>'}
                </div>
                <div class="panel" style="border-color:rgba(239,68,68,0.3); background:rgba(239,68,68,0.05); margin-top:20px;">
                    <div class="inp-group" style="margin-bottom:15px;">
                        <label style="color:var(--danger)">Licznik Zjazdowy (KM)</label>
                        <input type="number" id="de-o" class="big-inp" style="color:var(--danger); background:#000; padding:15px!important;" placeholder="np. ${d.odo + 150}">
                    </div>
                    <button class="btn btn-danger" onclick="window.endTaxiShift()">ZAKOŃCZ ZMIANĘ</button>
                </div>
            </div>
        </div>` : `
        <div class="dash-hero" style="padding-top:60px;">
            <div style="width:100px; height:100px; background:var(--taxi-grad); border-radius:32px; display:flex; align-items:center; justify-content:center; margin:0 auto 30px; font-size:4rem; box-shadow:0 15px 35px rgba(245,158,11,0.4); transform:rotate(5deg);">🚕</div>
            <h1 style="font-size:3.5rem;">Cześć, ${db.userName}!</h1>
            <p style="margin-top:15px;">Wpisz licznik przed jazdą.</p>
        </div>
        ${alertsHtml}
        <div class="panel" style="max-width:400px; margin:0 auto; border-color:var(--success);">
            <div class="inp-group">
                <input type="number" id="ds-o" class="big-inp" value="${d.odo > 0 ? d.odo : ''}" placeholder="Stan licznika">
            </div>
            <button class="btn btn-success" style="margin-top:20px; font-size:1.3rem; padding:25px;" onclick="window.startShift()">ROZPOCZNIJ PRACĘ</button>
        </div>`;
        return hdr + act + nav;
    }
    
    if(t === 'garage') {
        let fS = window.calcFuelioStats(); 
        let todayStr = new Date().toISOString().split('T')[0];
        
        return hdr + `
        <div class="dash-hero" style="padding-bottom:10px;">
            <p>ŚREDNIE SPALANIE</p>
            <h1 style="color:var(--fuel); font-size:4.5rem;">${fS.l1.toFixed(1)} <span style="font-size:1.5rem; color:var(--muted)">L/100</span></h1>
        </div>
        <div class="grid-2">
            <div class="box" style="border-color:rgba(249,115,22,0.3); align-items:center;"><span style="color:var(--fuel)">Koszt 100 KM</span><strong style="color:#fff">${fS.c1.toFixed(2)} zł</strong></div>
            <div class="box" style="border-color:rgba(249,115,22,0.3); align-items:center;"><span style="color:var(--fuel)">Koszt 1 KM</span><strong style="color:#fff">${d.cfg.fuelPx.toFixed(2)} zł</strong></div>
        </div>
        <div class="grid-responsive">
            <div class="panel" style="border-color:var(--fuel); background: linear-gradient(180deg, #18181b 0%, #000 100%);">
                <div class="p-title" style="color:var(--fuel)">⛽ Tankowanie</div>
                <div class="inp-row"><div class="inp-group"><label>Licznik (KM)</label><input type="number" id="df-o" placeholder="np. 155000"></div><div class="inp-group"><label>Litry</label><input type="number" id="df-l" step="0.1"></div></div>
                <div class="inp-row"><div class="inp-group"><label>Rachunek (zł)</label><input type="number" id="df-v"></div><div class="inp-group"><label>Pod korek?</label><select id="df-f"><option value="1">Tak</option><option value="0">Nie</option></select></div></div>
                <button class="btn" style="background:linear-gradient(135deg, var(--fuel), #c2410c); color:#fff;" onclick="window.addFuel()">ZAPISZ PARAGON</button>
            </div>
            <div>
                <div class="panel" style="border-color:rgba(59, 130, 246, 0.4)">
                    <div class="p-title" style="color:var(--info)">📋 Serwis i Ubezpieczenie</div>
                    <div class="inp-group" style="margin-bottom:10px;"><label>Wymiana oleju przy (KM)</label><input type="number" id="dg-srv" placeholder="np. 165000" value="${d.cfg.serviceOdo||''}"></div>
                    <div class="inp-row" style="margin-bottom:15px;"><div class="inp-group"><label>Koniec OC</label><input type="date" id="dg-oc" value="${d.docs.oc}"></div><div class="inp-group"><label>Przegląd</label><input type="date" id="dg-tech" value="${d.docs.tech}"></div></div>
                    <button class="btn btn-taxi" onclick="window.saveGarageDocs()">ZAPISZ TERMINY</button>
                </div>
                <div class="panel" style="border-color:rgba(239,68,68,0.4)">
                    <div class="p-title" style="color:var(--danger)">🔧 Inne Wydatki</div>
                    <div class="inp-row">
                        <div class="inp-group" style="flex:2"><label>Kategoria</label><select id="de-c"><option value="✨ Myjnia">✨ Myjnia</option><option value="🛠️ Serwis">🛠️ Serwis</option><option value="💧 Płyny">💧 Płyny</option><option value="📦 Inne koszty">📦 Inne</option></select></div>
                        <div class="inp-group"><label>Kwota (zł)</label><input type="number" id="de-v" placeholder="0.00"></div>
                    </div>
                    <div class="inp-group" style="margin-bottom:15px;"><label>Data</label><input type="date" id="de-date" value="${todayStr}"></div>
                    <button class="btn btn-danger" onclick="window.addGarageExpense()">ZAPISZ WYDATEK</button>
                </div>
            </div>
        </div>
        <div class="section-lbl">Historia Garażu</div>
        <div style="padding:0 15px;">
            ${db.drv.exp.map(x=>{
                let col = x.ty === 'f' ? 'var(--fuel)' : 'var(--danger)'; 
                return `
                <div class="log-item" style="border-left:5px solid ${col};">
                    <div><strong style="color:#fff">${x.d}</strong><br><small style="color:var(--muted)">${x.dt} ${x.odo ? '• '+x.odo+'km' : ''}</small></div>
                    <strong style="color:${col}; font-size:1.2rem">-${x.v.toFixed(2)} zł</strong>
                </div>`;
            }).join('') || '<div style="text-align:center;color:var(--muted);padding:20px;">Brak wpisów.</div>'}
        </div>` + nav;
    } 
    else if (t === 'stats') {
        let fM = db.filter || 'all'; 
        let now = new Date(); 
        let fs = [], fe = [];
        
        db.drv.h.forEach(s => { 
            let sd = new Date(s.rD); 
            if(fM==='all') fs.push(s); 
            else if(fM==='today' && sd.toDateString() === now.toDateString()) fs.push(s); 
            else if(fM==='month' && sd.getMonth() === now.getMonth() && sd.getFullYear() === now.getFullYear()) fs.push(s); 
            else if(fM==='week') { 
                let diff = now.getDate() - now.getDay() + (now.getDay() === 0 ? -6 : 1); 
                let st = new Date(now.setDate(diff)); st.setHours(0,0,0,0); 
                if(sd >= st) fs.push(s); 
            } 
        });
        
        db.drv.exp.forEach(e => { 
            let ed = new Date(e.rD); 
            if(fM==='all') fe.push(e); 
            else if(fM==='today' && ed.toDateString() === now.toDateString()) fe.push(e); 
            else if(fM==='month' && ed.getMonth() === now.getMonth() && ed.getFullYear() === now.getFullYear()) fe.push(e); 
            else if(fM==='week') { 
                let diff = now.getDate() - now.getDay() + (now.getDay() === 0 ? -6 : 1); 
                let st = new Date(now.setDate(diff)); st.setHours(0,0,0,0); 
                if(ed >= st) fe.push(e); 
            } 
        });
        
        let g = 0, k = 0, fc = 0, tx = 0, ex = 0, pf = 0, cf = 0; 
        fs.forEach(x => { g += x.g; k += x.k; fc += x.fc; tx += x.tx; pf += (x.pF || 0); cf += (x.cF || 0); }); 
        fe.forEach(x => { if(x.ty !== 'amort') ex += x.v; });
        
        let uD = new Set(fs.map(s => new Date(s.rD).toLocaleDateString())).size; 
        if(uD === 0 && d.sh.on && fM === 'today') uD = 1; 
        let fix = uD * d.cfg.fix; 
        let netProfit = g - fc - tx - fix - pf - cf - ex; 
        let rKm = k > 0 ? (netProfit / k) : 0;
        
        let dailyN = {}; 
        fs.forEach(x => { dailyN[x.dt] = (dailyN[x.dt] || 0) + x.n; }); 
        let bL = Object.keys(dailyN).reverse(); 
        let bD = Object.values(dailyN).reverse();

        setTimeout(() => { 
            if(window.dCh1) window.dCh1.destroy(); 
            let ctx1 = document.getElementById('ch-doughnut').getContext('2d'); 
            let labels = ['Paliwo', 'Wydatki Operacyjne', 'Podatki', 'Koszty Stałe']; 
            let data = [fc, ex, tx, fix]; 
            let colors = ['#f97316', '#ef4444', '#a855f7', '#3b82f6']; 
            if(pf > 0) { labels.push('Prowizja Partnera'); data.push(pf); colors.push('#10b981'); } 
            if(cf > 0) { labels.push('Terminal (Karty)'); data.push(cf); colors.push('#0ea5e9'); } 
            
            window.dCh1 = new Chart(ctx1, { 
                type: 'doughnut', 
                data: { labels: labels, datasets: [{ data: data, backgroundColor: colors, borderWidth: 0, hoverOffset: 5 }] }, 
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#8b8b93', font: {size: 11, family:'Plus Jakarta Sans', weight:'bold'} } } }, cutout: '75%' } 
            }); 
            
            if(window.dBCh) window.dBCh.destroy(); 
            let ctx2 = document.getElementById('tb-chart').getContext('2d');
            window.dBCh = new Chart(ctx2, { 
                type: 'bar', 
                data: { labels: bL, datasets: [{ label: 'Zysk Netto (zł)', data: bD, backgroundColor: '#f59e0b', borderRadius: 5 }] }, 
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#a1a1aa' } } } } 
            });
        }, 100);

        return hdr + `
        <div style="display:flex; background:rgba(0,0,0,0.5); border-radius:16px; margin:15px; padding:6px; border:1px solid var(--border);">
            <div class="m-btn ${fM==='today'?'act-b':''}" onclick="window.setTaxiFilter('today')">Dziś</div>
            <div class="m-btn ${fM==='week'?'act-b':''}" onclick="window.setTaxiFilter('week')">Tydz</div>
            <div class="m-btn ${fM==='month'?'act-b':''}" onclick="window.setTaxiFilter('month')">Msc</div>
            <div class="m-btn ${fM==='all'?'act-b':''}" onclick="window.setTaxiFilter('all')">All</div>
        </div>
        <div class="dash-hero" style="padding-top:20px;">
            <p>CZYSTY ZYSK</p>
            <h1 id="anim-stats-net" style="color:${netProfit >= 0 ? 'var(--success)' : 'var(--danger)'}; font-size:clamp(3.5rem, 12vw, 4.5rem);">0.00 zł</h1>
        </div>
        <div class="grid-2">
            <div class="box" style="border-color:rgba(59, 130, 246, 0.3);"><span style="color:var(--info)">Zysk na 1 KM</span><strong>${rKm.toFixed(2)} zł</strong></div>
            <div class="box" style="border-color:rgba(34, 197, 94, 0.3);"><span style="color:var(--success)">Dni Pracy</span><strong>${uD}</strong></div>
        </div>
        <div style="padding:0 15px; margin-bottom:20px; display:flex; gap:10px;">
            <button class="btn btn-taxi" style="font-size:0.9rem;" onclick="window.transferToHome()">💸 WYPŁAĆ DO PORTFELA</button>
            <button class="btn" style="background:#1e293b; color:#fff; border:1px solid var(--border); font-size:0.9rem;" onclick="window.exportCSV()">📄 EXCEL</button>
        </div>
        <div class="panel">
            <div class="p-title">Zarobki po Dniach</div>
            <div class="chart-wrapper"><canvas id="tb-chart"></canvas>${bL.length===0?'<div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:var(--muted); font-weight:800;">Brak danych</div>':''}</div>
            <div class="p-title">Struktura Kosztów</div>
            <div class="chart-wrapper"><canvas id="ch-doughnut"></canvas></div>
            
            <div class="p-title" style="margin-top:30px;">Raport P&L</div>
            <div class="fin-row"><span class="fin-label">Utarg Brutto</span><span class="fin-val" style="color:var(--success)">${g.toFixed(2)} zł</span></div>
            <div class="fin-row"><span class="fin-label">Spalone Paliwo</span><span class="fin-val" style="color:var(--fuel)">-${fc.toFixed(2)} zł</span></div>
            <div class="fin-row"><span class="fin-label">Inne Koszty Garażu</span><span class="fin-val" style="color:var(--danger)">-${ex.toFixed(2)} zł</span></div>
            ${cf > 0 ? `<div class="fin-row"><span class="fin-label" style="color:var(--info)">Prowizja Terminala</span><span class="fin-val" style="color:var(--danger)">-${cf.toFixed(2)} zł</span></div>` : ''}
            ${pf > 0 ? `<div class="fin-row"><span class="fin-label">Prowizja Partnera</span><span class="fin-val" style="color:var(--danger)">-${pf.toFixed(2)} zł</span></div>` : ''}
            <div class="fin-row"><span class="fin-label">Podatek (${(d.cfg.tax*100).toFixed(1)}%)</span><span class="fin-val" style="color:var(--danger)">-${tx.toFixed(2)} zł</span></div>
            <div class="fin-row"><span class="fin-label">Odpis (ZUS / Auto)</span><span class="fin-val" style="color:var(--danger)">-${fix.toFixed(2)} zł</span></div>
            
            <div style="background:#000; padding:20px; border-radius:20px; margin-top:20px; border:1px solid rgba(255,255,255,0.1); display:flex; justify-content:space-between; align-items:center;">
                <span style="color:#fff; font-size:1rem; text-transform:uppercase; font-weight:900;">ZYSK NETTO</span>
                <strong style="color:${netProfit >= 0 ? 'var(--success)' : 'var(--danger)'}; font-size:1.8rem; letter-spacing:-1px;">${netProfit.toFixed(2)} zł</strong>
            </div>
        </div>
        <div class="section-lbl" style="color:#fff;">Dziennik Zmian</div>
        <div style="padding: 0 15px;">
            ${fs.map(x=>`
            <div class="log-item" style="flex-direction:column; align-items:flex-start; border-left:5px solid ${x.n>=0?'var(--success)':'var(--danger)'};">
                <div style="display:flex; justify-content:space-between; width:100%; margin-bottom:5px;">
                    <strong style="font-size:1.1rem; color:#fff;">${x.dt}</strong>
                    <strong style="color:${x.n>=0?'var(--success)':'var(--danger)'}; font-size:1.3rem;">${x.n.toFixed(2)} zł</strong>
                </div>
                <small style="color:var(--muted); font-weight:600;">Utarg: ${x.g.toFixed(2)} zł | Przebieg: ${x.k}km</small>
            </div>`).join('') || '<div style="text-align:center; color:var(--muted); padding:20px;">Brak wpisów.</div>'}
        </div>` + nav;
    } 
    else if (t === 'quote') {
        let q = d.q;

window.endTaxiShift = function() {
    window.vib(100); 
    let e = window.getSafeVal('de-o'); 
    if(e <= db.drv.sh.o) return window.showModal('error','Błąd','Licznik końcowy musi być większy od startowego!','',null); 
    
    let g = 0, cf = 0; 
    db.drv.sh.tr.forEach(x => { g += x.v; if(x.p === 'Karta') cf += x.v * db.drv.cfg.cardF; }); 
    
    let k = e - db.drv.sh.o; 
    let fc = k * db.drv.cfg.fuelPx; 
    let tx = g * db.drv.cfg.tax; 
    let n = g - fc - tx - (db.drv.cfg.eType === 'pct' ? g * db.drv.cfg.ePct : 0) - cf - db.drv.cfg.fix; 
    
    db.drv.odo = e; 
    db.drv.h.unshift({id:Date.now(), rD:new Date().toISOString(), dt:new Date().toLocaleDateString(), g, n, k, fc, tx, cF:cf, tr:[...db.drv.sh.tr]}); 
    db.drv.sh.on = false; 
    db.drv.sh.tr = []; 
    
    window.saveDb(); db.tab='stats'; window.renderApp(); 
    window.showModal('success','Koniec Zmiany',`Dobra robota! Zarobiłeś na czysto: ${n.toFixed(2)} zł`,'',null); 
};

window.calcFuelioStats = function() {
    let l = db.drv.fuel; let s = {l1:0, c1:0, ck:db.drv.cfg.fuelPx}; 
    if(l.length >= 2){ 
        let f = l.filter(x => x.isF === 1); 
        if(f.length >= 2){ 
            let dist = f[0].o - f[1].o; 
            if(dist > 0){ 
                let tl = 0, tc = 0; 
                for(let i=0; i<l.indexOf(f[1]); i++){ tl += l[i].l; tc += l[i].v; } 
                s.l1 = (tl/dist)*100; s.c1 = (tc/dist)*100; s.ck = tc/dist; 
                db.drv.cfg.fuelPx = s.ck; window.saveDb(); 
            } 
        } 
    }
    return s;
};

    } 
    
    let dailyCar = (db.drv.cfg.cType === 'week') ? (db.drv.cfg.cC / 7) : (db.drv.cfg.cC / 30);

    db.drv.cfg.fix = dailyCar + dailyOther; 
    
    window.saveDb(); window.renderApp();

// LOGIKA MAP
window.calculateRoute = async function() {
    window.vib(); 
    let s = document.getElementById('dq-start').value; 
    let e = document.getElementById('dq-end').value; 
    if(!s || !e) return window.showModal('error', 'Błąd', 'Podaj początek i koniec trasy.', '', null); 
    
    let dC = db.drv.cfg.defCity || 'Szczecin'; 
    let sQ = s.includes(dC) ? s : s + ', ' + dC; 
    let eQ = e.includes(dC) ? e : e + ', ' + dC; 
    
    try { 
        let rS = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(sQ)}`); 
        let dS = await rS.json(); 
        let rE = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(eQ)}`); 
        let dE = await rE.json(); 
        
        if(!dS.length || !dE.length) return window.showModal('error', 'Błąd', 'Nie znaleziono adresu na mapie.', '', null); 
        
        let route = await fetch(`https://router.project-osrm.org/route/v1/driving/${dS[0].lon},${dS[0].lat};${dE[0].lon},${dE[0].lat}?overview=full&geometries=geojson`); 
        let rData = await route.json(); 
        
        dQK = rData.routes[0].distance / 1000; 
        dQM_T = Math.round(rData.routes[0].duration / 60); 
        
        document.getElementById('map-container').classList.remove('hidden'); 
        if(!window.lmap) { 
            window.lmap = L.map('map').setView([dS[0].lat, dS[0].lon], 13); 
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(window.lmap); 
        } 
        window.lmap.invalidateSize(); 
        if(window.routeLayer) window.lmap.removeLayer(window.routeLayer); 
        
        window.routeLayer = L.geoJSON(rData.routes[0].geometry, {style:{color:'#d946ef',weight:6}}).addTo(window.lmap); 
        window.lmap.fitBounds(window.routeLayer.getBounds(), {padding:[30,30]}); 
        
        document.getElementById('res-km').innerText = dQK.toFixed(1) + ' km'; 
        document.getElementById('res-min').innerText = dQM_T + ' min'; 
        
        let isOut = !e.toLowerCase().includes(dC.toLowerCase());
        let slider = document.getElementById('zone-slider');
        slider.max = dQK.toFixed(1);
        if (isOut) {
            slider.value = Math.min(10, dQK);
            document.getElementById('zone-split').classList.remove('hidden');
        } else {
            slider.value = dQK.toFixed(1);
            document.getElementById('zone-split').classList.add('hidden');
        }
        
        window.updateZoneSplit(); 
    } catch(err) { 
        window.showModal('error', 'Błąd', 'Problem z połączeniem do serwerów map.', '', null); 
    } 
};

window.setMapTime = function(isNight) {
    window.vib();
    dQN = isNight;
    window.renderApp();
    setTimeout(() => {
        document.getElementById('map-container').classList.remove('hidden');
        if (window.lmap) window.lmap.invalidateSize();
        window.updateZoneSplit();
    }, 100);
};

window.updateZoneSplit = function() {
    let slider = document.getElementById('zone-slider'); 
    if(!slider) return;
    let inDist = parseFloat(slider.value); 
    let outDist = parseFloat(slider.max) - inDist; 
    document.getElementById('val-in').innerText = inDist.toFixed(1); 
    document.getElementById('val-out').innerText = outDist.toFixed(1); 
    window.updateRoutePrice(inDist, outDist); 
};

window.updateRoutePrice = function(inDist = dQK, outDist = 0) {
    let q = db.drv.q; 
    let discSel = document.getElementById('dq-c'); 
    let disc = (discSel && discSel.selectedIndex > 0) ? parseFloat(discSel.options[discSel.selectedIndex].getAttribute('data-d')) : 0; 
    
    let base = q.s + (inDist * (dQN ? q.t2 : q.t1)) + (outDist * (dQN ? q.t4 : q.t3)) + (dQM_T * (q.w / 60)); 
    dQV = base - (base * (disc / 100)); 
    let resEl = document.getElementById('dqt');
    if(resEl) resEl.innerText = dQV.toFixed(2) + " zł"; 
};

window.bookMapRide = function() {
    window.vib(); 
    if(!db.drv.sh.on) return window.showModal('error', 'Błąd', 'Aby zaksięgować kurs z mapy, musisz mieć otwartą zmianę!', '', null); 
    if(dQV > 0) { 
        db.drv.sh.tr.unshift({id:Date.now(), v:dQV, k:dQK.toFixed(1), m:dQM_T, s:'Z Mapy', p:'Gotówka'}); 
        window.saveDb(); 
        window.changeTab('term'); 
    } 
};

window.saveTaxiTariffs = function() {
    window.vib(); 
    db.drv.q = { 
        s:window.getSafeVal('qs'), w:window.getSafeVal('qw'), 
        t1:window.getSafeVal('q1'), t2:window.getSafeVal('q2'), 
        t3:window.getSafeVal('q3'), t4:window.getSafeVal('q4') 
    }; 
    window.saveDb(); 
    window.showModal('success', 'Zapisano', 'Nowe stawki taryfikatora działają.', '', null); 
};

// Pierwsze załadowanie widoku
window.renderApp();
</script>
