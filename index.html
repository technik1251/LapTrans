<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ŁAPTRANS OS</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#09090b">
<link rel="manifest" href='data:application/manifest+json,{"name":"ŁAPTRANS OS","short_name":"ŁapTrans","start_url":".","display":"standalone","background_color":"#09090b","theme_color":"#09090b","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/758/758488.png","sizes":"512x512","type":"image/png"}]}'>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
  :root {
    --bg: #09090b; --card: #18181b; --border: #27272a; --text: #f8fafc; --muted: #a1a1aa;
    --taxi: #eab308; --life: #14b8a6; --driver: #3b82f6; --fleet: #10b981; --cargo: #8b5cf6; 
    --sped: #f59e0b; --quote: #d946ef; --fuel: #f59e0b; --home: #14b8a6; --plan: #a855f7;
    --success: #22c55e; --danger: #ef4444; --warning: #eab308; --info: #0ea5e9;
  }
  
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
  .app-container { max-width: 500px; margin: 0 auto; min-height: 100vh; padding-bottom: 90px; position: relative; }
  .panel { background: var(--card); border: 1px solid var(--border); border-radius: 24px; margin: 15px; padding: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
  .p-title { font-size: 0.8rem; font-weight: 800; color: var(--muted); text-transform: uppercase; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 12px; display: flex; justify-content: space-between; align-items: center; letter-spacing: 1px;}
  .form-section { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 18px; border-radius: 16px; margin-bottom: 15px; }
  .fs-title { font-size: 0.75rem; text-transform: uppercase; font-weight: 800; margin-bottom: 12px; color: var(--muted); display:flex; align-items:center; gap:8px;}

  .btn { width: 100%; padding: 18px; border-radius: 16px; border: none; font-weight: 900; font-size: 1rem; cursor: pointer; text-transform: uppercase; transition: all 0.2s; margin-top: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
  .btn:active { transform: scale(0.97); }
  .btn-driver { background: linear-gradient(135deg, #3b82f6, #2563eb); color: #fff; } 
  .btn-fleet { background: linear-gradient(135deg, #10b981, #059669); color: #000; }
  .btn-cargo { background: linear-gradient(135deg, #8b5cf6, #7c3aed); color: #fff; } 
  .btn-sped { background: linear-gradient(135deg, #f59e0b, #d97706); color: #000; }
  .btn-home { background: linear-gradient(135deg, #14b8a6, #0f766e); color: #fff; } 
  .btn-quote { background: linear-gradient(135deg, #d946ef, #c026d3); color: #fff; } 
  .btn-danger { background: rgba(239,68,68,0.1); border: 1px solid var(--danger); color: var(--danger); box-shadow: none;}
  
  .inp-row { display: flex; gap: 12px; margin-bottom: 12px; }
  .inp-group { flex: 1; display: flex; flex-direction: column; }
  .inp-group label { font-size: 0.7rem; color: var(--muted); font-weight: 600; margin-bottom: 6px; padding-left: 4px;}
  .inp-group input, .inp-group select { background: #09090b; border: 1px solid var(--border); color: #fff; padding: 16px; border-radius: 14px; text-align: left; font-size: 1.1rem; font-weight: 600; outline: none; width: 100%; box-sizing: border-box; transition: 0.3s; }
  .inp-group input:focus, .inp-group select:focus { border-color: var(--driver); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }
  .big-inp { font-size: 2rem !important; padding: 20px !important; font-weight: 900 !important; text-align: center !important; width: 100% !important; box-sizing: border-box !important; }

  .wiz-screen { display: none; padding: 30px 20px; min-height: 90vh; flex-direction: column; justify-content: center; animation: fadeIn 0.4s; }
  .wiz-screen.active { display: flex; }
  @keyframes fadeIn { from {opacity:0; transform:translateY(20px);} to {opacity:1; transform:translateY(0);} }
  .w-title { font-size: 2.5rem; font-weight: 900; text-align: center; margin-bottom: 8px; letter-spacing: -1.5px; }
  .w-sub { color: var(--muted); text-align: center; margin-bottom: 35px; font-size: 1rem; font-weight: 400;}
  .opt-card { background: var(--card); border: 2px solid var(--border); border-radius: 20px; padding: 24px; margin-bottom: 15px; cursor: pointer; display: flex; align-items: center; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.2);}
  .opt-card:active { transform: scale(0.98); }
  .opt-card.selected { border-width: 2px; background: rgba(255,255,255,0.03); }
  .opt-icon { font-size: 2.8rem; margin-right: 20px; }
  .opt-text h3 { margin: 0 0 5px 0; font-size: 1.2rem; font-weight: 800;}
  .opt-text p { margin: 0; font-size: 0.85rem; color: var(--muted); line-height: 1.4;}

  header { padding: 15px 20px; background: rgba(9, 9, 11, 0.85); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(12px); }
  .logo { font-weight: 900; font-size: 1.2rem; cursor:pointer; display:flex; align-items:center; gap:8px; padding:5px 10px; background:rgba(255,255,255,0.05); border-radius:12px; transition:0.2s; }
  .badge { background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 6px 12px; border-radius: 12px; font-weight: 800; }
  .settings-btn { font-size: 1.3rem; cursor: pointer; background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 4px 10px; border-radius: 12px; display:flex; align-items:center; justify-content:center; }
  
  .dash-hero { text-align: center; padding: 30px 0 20px; }
  .dash-hero p { margin: 0 0 8px 0; font-size: 0.75rem; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; }
  .dash-hero h1 { margin: 0; font-size: 4rem; font-weight: 900; letter-spacing: -2.5px; line-height: 1; }
  
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; padding: 0 15px;}
  .grid-4 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; padding: 0 15px;}
  .box { background: var(--card); border: 1px solid var(--border); padding: 16px; border-radius: 16px; display: flex; flex-direction: column; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2);}
  .box span { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; font-weight: 800; margin-bottom: 6px; }
  .box strong { font-size: 1.3rem; font-weight: 900;}
  
  .log-item { background: var(--bg); border: 1px solid var(--border); border-left: 5px solid var(--border); border-radius: 16px; padding: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s;}
  .chip-box { display: flex; gap: 10px; overflow-x: auto; margin-bottom: 20px; padding-bottom: 5px; }
  .chip-box::-webkit-scrollbar { display: none; }
  .chip { padding: 12px 18px; background: rgba(255,255,255,0.03); border: 1px solid transparent; color: var(--muted); border-radius: 12px; font-size: 0.85rem; font-weight: 800; cursor: pointer; white-space: nowrap; flex: 1; text-align: center;}
  .mode-switch { display: flex; background: var(--bg); border-radius: 14px; border: 1px solid var(--border); padding: 5px; margin-bottom: 20px; }
  .mode-switch .m-btn { flex: 1; text-align: center; padding: 12px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; cursor: pointer; border-radius: 10px; color: var(--muted); transition: 0.3s; }
  .mode-switch .m-btn.active { background: var(--driver); color: #fff; }

  .fin-row { display: flex; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.95rem; align-items: center;}
  .fin-row:last-child { border-bottom: none; }
  .fin-label { color: var(--muted); font-weight: 600;}
  .fin-val { font-weight: 800; font-size: 1.1rem;}

  .nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: rgba(24, 24, 27, 0.95); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 10px 0 20px 0; z-index: 1000; backdrop-filter: blur(20px); box-shadow: 0 -5px 20px rgba(0,0,0,0.4);}
  .nav-item { color: var(--muted); text-align: center; font-size: 0.55rem; font-weight: 800; cursor: pointer; text-transform: uppercase; flex: 1; transition: 0.2s;}
  .nav-item.active { color: var(--driver); transform: translateY(-2px);}
  .nav-item i { font-size: 1.25rem; display: block; margin-bottom: 5px; font-style: normal; }
  
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 20000; padding: 20px; display: flex; flex-direction: column; justify-content:center; align-items:center; }
  .hidden { display: none !important; }
  
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.6); } 70% { box-shadow: 0 0 0 15px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
  .btn-live { animation: pulse 2s infinite; background: linear-gradient(135deg, #10b981, #059669); color: #fff; border: 2px solid #34d399; }
  .highlight-input { border-color: var(--success) !important; background: rgba(34, 197, 94, 0.1) !important; transition: 0.5s; }
</style>
</head>
<body>

<div id="app" class="app-container"></div>

<div id="m-switcher" class="modal-overlay hidden">
    <div class="panel" style="width:100%; max-width:400px; border-color:var(--driver);">
        <div class="p-title" style="justify-content:center; font-size:1rem; color:#fff;">Przełącz Aplikację</div>
        <div id="switcher-btns" style="display:flex; flex-direction:column;"></div>
        <button class="btn" style="background:#222; color:#fff; margin-top:10px;" onclick="document.getElementById('m-switcher').classList.add('hidden')">Zamknij Menu</button>
    </div>
</div>

<script>
// ==========================================
// 1. INICJALIZACJA I BAZA DANYCH
// ==========================================
let defaultDb = {
    init: false, mainProfile: null, role: null, tab: 'term', filter: 'today', userName: '',
    drv: { 
        plat: 'apps', carType: 'rent', emp: 'partner', liveRideStart: null,
        cfg: { fix: 0, tax: 0, fuelPx: 0.5, bC: 0, cC: 0, cType: 'month', eC: 0, iC: 0, eType: 'flat', ePct: 0, cardF: 0.015, goal: 350 }, 
        odo: 0, q: {s:9, w:39, t1:3.2, t2:4, t3:6.4, t4:8}, 
        sh: {on: false, o: 0, tr: []}, 
        h: [], exp: [], fuel: [], clients: [] 
    },
    flt: { n: '', cars: [], tx: [] },
    crg: { n: '', fuel: 5.2, cars: [], fr: [] },
    spd: { n: '', fix: 2000, fuel: 5.2, tx: [] },
    home: { n: 'Mój Dom', sal: 0, fix: 0, exp: [], inc: [], members: [], planned: [] }
};

let db;
try {
    db = JSON.parse(localStorage.getItem('laptrans_v83_db')) || defaultDb;
    if (!db.home || !db.drv || !db.drv.cfg) { db = defaultDb; }
} catch(e) { db = defaultDb; }

let wData = { p: 'apps', c: 'rent', e: 'partner', mainProfile: null }; 
window.hMem = null; 
const APP = document.getElementById('app');

function save() { localStorage.setItem('laptrans_v83_db', JSON.stringify(db)); }

let dTSrc = null; let dTPay = null; let dQM = 'taxi'; let dQN = false; let dQV=0; let dQK=0; let dQM_T=0;

// Poprawa błędu Uber / Korporacja
function dSessionInit() { 
    if(!db || !db.drv) return;
    if(db.drv.plat === 'apps') {
        if(!dTSrc || dTSrc==='Centrala' || dTSrc==='Postój') dTSrc = 'Uber';
        if(!dTPay) dTPay = 'Online';
    } else {
        if(!dTSrc || dTSrc==='Uber' || dTSrc==='Bolt') dTSrc = 'Centrala';
        if(!dTPay) dTPay = 'Gotówka';
    }
}

function safeVal(id, fallback = 0) {
    let el = document.getElementById(id);
    if(el && el.value) { let v = parseFloat(el.value); return isNaN(v) ? fallback : v; }
    return fallback;
}

function hardReset() { 
    if(confirm("UWAGA! Usunąć wszystkie dane z aplikacji? Tego nie da się cofnąć!")) { 
        localStorage.clear(); location.reload(); 
    } 
}

function openSwitcher() {
    let s = document.getElementById('m-switcher');
    let sBtns = document.getElementById('switcher-btns');
    let html = '';
    if (db.mainProfile === 'driver') {
        html += `<button class="btn btn-driver" style="margin-bottom:10px; font-size:0.9rem;" onclick="switchApp('drv')">🚕 Mój Panel Taxi</button>`;
        html += `<button class="btn btn-home" style="margin-bottom:10px; font-size:0.9rem;" onclick="switchApp('home')">🏠 Budżet Domowy</button>`;
    } else if (db.mainProfile === 'firm') {
        html += `<button class="btn btn-fleet" style="margin-bottom:10px; font-size:0.9rem;" onclick="switchApp('flt')">🏢 Partner Flotowy</button>`;
        html += `<button class="btn btn-cargo" style="margin-bottom:10px; font-size:0.9rem;" onclick="switchApp('crg')">🚚 Transport / Giełda</button>`;
        html += `<button class="btn btn-sped" style="margin-bottom:10px; font-size:0.9rem;" onclick="switchApp('spd')">📈 Agencja Spedycyjna</button>`;
        html += `<button class="btn btn-home" style="margin-bottom:10px; font-size:0.9rem;" onclick="switchApp('home')">🏠 Budżet Domowy</button>`;
    } else {
        html += `<button class="btn btn-home" style="margin-bottom:10px; font-size:0.9rem;" onclick="switchApp('home')">🏠 Budżet Domowy</button>`;
    }
    sBtns.innerHTML = html; s.classList.remove('hidden');
}

function switchApp(newRole) { 
    db.role = newRole; db.tab = (newRole==='drv') ? 'term' : 'dash'; 
    save(); document.getElementById('m-switcher').classList.add('hidden'); render(); 
}

function render() {
    if(!db || !db.init) return rWiz();
    dSessionInit();
    if(db.role === 'drv') return rDrv();
    if(db.role === 'flt') return rFlt();
    if(db.role === 'crg') return rCrg();
    if(db.role === 'spd') return rSped();
    if(db.role === 'home') return rHome(); 
    return rWiz();
}

function rFlt() { APP.innerHTML = `<header><div class="logo" onclick="openSwitcher()">ŁAPTRANS <span style="color:var(--fleet)">⏷</span></div></header><div class="dash-hero"><h1 style="color:var(--fleet)">Moduł Floty</h1><p>Wkrótce tutaj pełne zarządzanie flotą.</p></div><button class="btn" style="margin:20px; width:calc(100% - 40px);" onclick="openSwitcher()">Wróć do wyboru</button>`; }
function rCrg() { APP.innerHTML = `<header><div class="logo" onclick="openSwitcher()">ŁAPTRANS <span style="color:var(--cargo)">⏷</span></div></header><div class="dash-hero"><h1 style="color:var(--cargo)">Moduł Przewoźnika</h1><p>Wkrótce tutaj pełny system TMS.</p></div><button class="btn" style="margin:20px; width:calc(100% - 40px);" onclick="openSwitcher()">Wróć do wyboru</button>`; }
function rSped() { APP.innerHTML = `<header><div class="logo" onclick="openSwitcher()">ŁAPTRANS <span style="color:var(--sped)">⏷</span></div></header><div class="dash-hero"><h1 style="color:var(--sped)">Agencja Spedycyjna</h1><p>Wkrótce tutaj giełda i zlecenia.</p></div><button class="btn" style="margin:20px; width:calc(100% - 40px);" onclick="openSwitcher()">Wróć do wyboru</button>`; }

// ==========================================
// 2. KREATOR STARTOWY (WIZARD)
// ==========================================
function rWiz() {
    let html = `
        <div id="w-main" class="wiz-screen active">
            <div class="w-title" style="color:#fff; font-size:3rem; margin-bottom:0;">ŁAPTRANS OS</div>
            <div class="w-sub" style="margin-bottom:20px;">System Zarządzania i Księgowości</div>
            <div class="wiz-inputs" style="display:block; padding:0; background:transparent; border:none; margin-bottom:20px;">
                <div class="inp-group"><label style="text-align:center; font-size:0.8rem;">Jak masz na imię?</label><input type="text" id="w-name" placeholder="Twoje Imię" style="text-align:center; font-size:1.5rem; font-weight:900;" value="${db.userName||''}"></div>
            </div>
            <div class="opt-card" style="border-color:var(--driver)" onclick="wMainProfile('driver')"><div class="opt-icon">🚕</div><div class="opt-text"><h3 style="color:var(--driver)">Kierowca Taxi</h3><p>Zarobki, terminal, koszty własne.</p></div></div>
            <div class="opt-card" style="border-color:var(--fleet)" onclick="wMainProfile('firm')"><div class="opt-icon">🏢</div><div class="opt-text"><h3 style="color:var(--fleet)">Moja Firma</h3><p>Flota, przewoźnik, spedycja.</p></div></div>
            <div class="opt-card" style="border-color:var(--life)" onclick="wMainProfile('home')"><div class="opt-icon">🏠</div><div class="opt-text"><h3 style="color:var(--life)">Budżet Domowy</h3><p>Zarządzaj prywatnymi wydatkami.</p></div></div>
        </div>

        <div id="w-firm" class="wiz-screen">
            <div class="w-title">Moduły Firmowe</div><div class="w-sub">Wybierz centrum dowodzenia.</div>
            <div class="opt-card" style="border-color:var(--fleet)" onclick="fFin()"><div class="opt-icon">🏢</div><div class="opt-text"><h3 style="color:var(--fleet)">Partner Flotowy (Taxi)</h3></div></div>
            <div class="opt-card" style="border-color:var(--cargo)" onclick="cFin()"><div class="opt-icon">🚚</div><div class="opt-text"><h3 style="color:var(--cargo)">Przewoźnik (TMS)</h3></div></div>
            <div class="opt-card" style="border-color:var(--sped)" onclick="sFin()"><div class="opt-icon">📈</div><div class="opt-text"><h3 style="color:var(--sped)">Agencja Spedycyjna</h3></div></div>
            <button class="btn btn-danger" style="background:transparent;" onclick="wS('w-main')">Wróć</button>
        </div>
        
        <div id="w-home" class="wiz-screen">
            <div class="w-title" style="color:var(--life)">Budżet Rodzinny</div><div class="w-sub">Twoje osobiste finanse domowe</div>
            <div class="wiz-inputs" style="display:block;border-color:var(--life);background:transparent;padding:0;"><div class="inp-group" style="margin-bottom:15px;"><label>Stała Miesięczna Wypłata (Na rękę) zł</label><input type="number" id="wh-sal" placeholder="np. 5000"></div><div class="inp-group"><label>Wspólne Opłaty (Czynsz, kredyt) zł/msc</label><input type="number" id="wh-fix" placeholder="np. 2500"></div></div>
            <button class="btn btn-home" onclick="hFin()">Otwórz Portfel</button>
            <button class="btn btn-danger" style="background:transparent; margin-top:15px;" onclick="wS('w-main')">Wróć</button>
        </div>
        
        <div id="w-d1" class="wiz-screen">
            <div class="w-title">Gdzie pracujesz?</div><div class="w-sub">Krok 1 z 3</div>
            <div class="opt-card selected" onclick="dW('p','apps',this)"><div class="opt-icon">📱</div><div class="opt-text"><h3>Aplikacje (Uber/Bolt)</h3></div></div>
            <div class="opt-card" onclick="dW('p','corp',this)"><div class="opt-icon">📻</div><div class="opt-text"><h3>Korporacja / Prywatnie</h3></div></div>
            <div id="wd-b" class="wiz-inputs" style="display:none; margin-top:5px; padding:0 5px;"><div class="inp-group"><label>Opłata za bazę/korporację (zł/mc)</label><input type="number" id="wd-b-v" placeholder="np. 400"></div></div>
            <button class="btn btn-driver" style="margin-top:20px;" onclick="wS('w-d2')">Dalej</button>
        </div>
        
        <div id="w-d2" class="wiz-screen">
            <div class="w-title">Twoje Auto</div><div class="w-sub">Krok 2 z 3</div>
            <div class="opt-card selected" onclick="dW('c','rent',this)"><div class="opt-icon">🤝</div><div class="opt-text"><h3>Wynajem od Floty</h3></div></div>
            <div class="opt-card" onclick="dW('c','lease',this)"><div class="opt-icon">📝</div><div class="opt-text"><h3>Własne w Leasingu</h3></div></div>
            <div class="opt-card" onclick="dW('c','own',this)"><div class="opt-icon">🚗</div><div class="opt-text"><h3>Własne Spłacone</h3></div></div>
            <div id="wd-c" class="wiz-inputs" style="display:block; margin-top:5px; padding:0 5px;"><div class="inp-row"><div class="inp-group"><label>Koszt za auto (zł)</label><input type="number" id="wd-c-v" placeholder="np. 600"></div><div class="inp-group"><label>Okres rozliczenia</label><select id="wd-c-type"><option value="week">Tygodniowo</option><option value="month" selected>Miesięcznie</option></select></div></div></div>
            <button class="btn btn-driver" onclick="wS('w-d3')">Dalej</button>
        </div>
        
        <div id="w-d3" class="wiz-screen">
            <div class="w-title">Podatki i Umowy</div><div class="w-sub">Krok 3 z 3</div>
            <div class="opt-card selected" onclick="dW('e','partner',this)"><div class="opt-icon">🤝</div><div class="opt-text"><h3>Podpięty pod Partnera</h3></div></div>
            <div class="opt-card" onclick="dW('e','jdg',this)"><div class="opt-icon">💼</div><div class="opt-text"><h3>Własna Działalność (JDG)</h3></div></div>
            <div id="wd-e-p" class="wiz-inputs" style="display:block; margin-top:5px; padding:0 5px;"><div class="inp-group" style="margin-bottom:15px;"><label>Rodzaj umowy z Partnerem</label><select id="wd-p-type" onchange="dTogglePType('wd')"><option value="flat">Stała kwota (np. 200 zł/mc)</option><option value="pct">Procent od utargu (np. 50/50)</option></select></div><div class="inp-group" id="wd-p-flat-box"><label>Koszt stały (zł/mc)</label><input type="number" id="wd-p-v" placeholder="np. 200"></div><div class="inp-group" id="wd-p-pct-box" style="display:none;"><label>Prowizja Partnera (%) z utargu</label><input type="number" id="wd-p-pct" placeholder="np. 50" style="color:var(--driver); font-weight:bold;"></div></div>
            <div id="wd-e-j" class="wiz-inputs" style="display:none; margin-top:5px; padding:0 5px;"><div class="inp-group" style="margin-bottom:15px;"><label>Wysokość ZUS (zł/mc)</label><select id="wd-j-z"><option value="400">Ulga na Start (~400 zł/mc)</option><option value="650">Mały ZUS (~650 zł/mc)</option><option value="1600" selected>Pełny ZUS (~1600 zł/mc)</option></select></div><div class="inp-group"><label>Podatek Dochodowy</label><select id="wd-j-t"><option value="0.085">8.5% (Ryczałt)</option><option value="0.12">12% (Skala)</option></select></div></div>
            <div class="wiz-inputs" style="display:block; margin-top:15px; border-color:var(--info); padding:0 5px;"><div class="inp-group"><label style="color:var(--info);">Inne Koszty Stałe (Księgowy itp.) zł/mc</label><input type="number" id="wd-i-v" placeholder="np. 350"></div></div>
            <button class="btn btn-success" style="margin-top:20px; font-size:1.1rem; padding:20px;" onclick="dFin()">Uruchom Aplikację</button>
        </div>
    `;
    APP.innerHTML = html;
}

function wS(id) { document.querySelectorAll('.wiz-screen').forEach(e=>e.classList.remove('active')); let t = document.getElementById(id); if(t) t.classList.add('active'); }
function wMainProfile(prof) { wData.mainProfile = prof; if(prof==='driver') wS('w-d1'); else if(prof==='firm') wS('w-firm'); else if(prof==='home') wS('w-home'); }
function dW(cat, val, el) { wData[cat] = val; el.parentElement.querySelectorAll('.opt-card').forEach(c=>{ c.style.borderColor='var(--border)'; c.classList.remove('selected'); }); el.style.borderColor='var(--driver)'; el.classList.add('selected'); if(cat==='p') { let elB = document.getElementById('wd-b'); if(elB) elB.style.display = (val === 'corp') ? 'block' : 'none'; } if(cat==='c') { let elC = document.getElementById('wd-c'); if(elC) elC.style.display = (val === 'own') ? 'none' : 'block'; } if(cat==='e') { let ep = document.getElementById('wd-e-p'); let ej = document.getElementById('wd-e-j'); if(ep) ep.style.display = (val === 'partner') ? 'block' : 'none'; if(ej) ej.style.display = (val === 'jdg') ? 'block' : 'none'; } }
function dTogglePType(prefix) { let elT = document.getElementById(`${prefix}-p-type`); let val = elT ? elT.value : 'flat'; let flatBox = document.getElementById(`${prefix}-p-flat-box`); let pctBox = document.getElementById(`${prefix}-p-pct-box`); if(flatBox) flatBox.style.display = (val === 'flat') ? 'block' : 'none'; if(pctBox) pctBox.style.display = (val === 'pct') ? 'block' : 'none'; }

function dFin() { 
    db.mainProfile = wData.mainProfile || 'driver';
    let nameEl = document.getElementById('w-name'); db.userName = nameEl ? (nameEl.value || 'Kierowca') : 'Kierowca';
    db.drv.plat = wData.p; db.drv.carType = wData.c; db.drv.emp = wData.e; 
    let b = wData.p === 'corp' ? safeVal('wd-b-v') : 0; let c = wData.c === 'own' ? 0 : safeVal('wd-c-v'); let cTypeEl = document.getElementById('wd-c-type'); let cType = wData.c === 'own' ? 'month' : (cTypeEl ? cTypeEl.value : 'month');
    let i = safeVal('wd-i-v'); let e = 0, eTy = 'flat', ePct = 0; 
    if(wData.e === 'partner') { let pTypeEl = document.getElementById('wd-p-type'); eTy = pTypeEl ? pTypeEl.value : 'flat'; if(eTy === 'flat') { e = safeVal('wd-p-v'); } else { ePct = safeVal('wd-p-pct') / 100; } } else { e = safeVal('wd-j-z'); } 
    db.drv.cfg.bC = b; db.drv.cfg.cC = c; db.drv.cfg.cType = cType; db.drv.cfg.eC = e; db.drv.cfg.iC = i; db.drv.cfg.eType = eTy; db.drv.cfg.ePct = ePct; 
    let dailyCar = (cType === 'week') ? (c / 7) : (c / 30); let dailyOther = (b + e + i) / 30; db.drv.cfg.fix = dailyCar + dailyOther;
    db.drv.cfg.tax = (wData.e === 'partner') ? 0 : safeVal('wd-j-t'); db.drv.cfg.cardF = 0.015; db.drv.cfg.goal = 350;
    db.role = 'drv'; db.tab = 'term'; db.init = true; save(); dSessionInit(); render(); 
}
function fFin() { db.mainProfile = 'firm'; db.userName = document.getElementById('w-name').value || 'Szefie'; db.role='flt'; db.tab='dash'; db.init=true; save(); render(); }
function cFin() { db.mainProfile = 'firm'; db.userName = document.getElementById('w-name').value || 'Przewoźniku'; db.role='crg'; db.tab='dash'; db.init=true; save(); render(); }
function sFin() { db.mainProfile = 'firm'; db.userName = document.getElementById('w-name').value || 'Brokerze'; db.role='spd'; db.tab='dash'; db.init=true; save(); render(); }
function hFin() { db.mainProfile = 'home'; db.userName = document.getElementById('w-name').value || 'Domownik'; db.home.sal = safeVal('wh-sal'); db.home.fix = safeVal('wh-fix'); db.home.members = [db.userName]; db.role = 'home'; db.tab = 'dash'; db.init = true; save(); render(); }

function rDrv() {
    let d=db.drv; let t=db.tab;
    
    let nav = `<div class="nav"><div class="nav-item ${t==='term'?'active':''}" onclick="db.tab='term';render()"><i>🚕</i>Panel</div><div class="nav-item ${t==='quote'?'active':''}" onclick="db.tab='quote';render()"><i>🧮</i>Wycena</div><div class="nav-item ${t==='garage'?'active':''}" onclick="db.tab='garage';render()"><i>⛽</i>Garaż</div><div class="nav-item ${t==='stats'?'active':''}" onclick="db.tab='stats';render()"><i>📊</i>Wyniki</div><div class="nav-item ${t==='crm'?'active':''}" onclick="db.tab='crm';render()"><i>👥</i>Klienci</div></div>`;
    let isSwitcherValid = db.mainProfile !== 'home'; let hdrAction = isSwitcherValid ? `onclick="openSwitcher()"` : ''; let hdrIcon = isSwitcherValid ? `<span style="color:var(--driver)">⏷</span>` : `<span style="color:var(--driver)">TAXI</span>`;
    let hdr = `<header><div class="logo" ${hdrAction}>ŁAPTRANS ${hdrIcon}</div><div class="header-actions"><div class="badge" style="color:var(--fuel); border-color:rgba(245,158,11,0.3); background:rgba(245,158,11,0.1);">${d.odo} KM</div><div class="settings-btn" onclick="db.tab='set';render()">⚙️</div></div></header>`;

    if(t === 'term') { 
        // Dynamiczne generowanie chipów Uber/Bolt vs Centrala/Postój na podstawie d.plat
        let ch1 = d.plat === 'apps' 
            ? `<div class="chip ${dTSrc==='Uber'?'active':''}" style="${dTSrc==='Uber'?'background:var(--driver);color:#fff':'color:var(--muted)'}" onclick="dTC('s','Uber',this)">Uber</div><div class="chip ${dTSrc==='Bolt'?'active':''}" style="${dTSrc==='Bolt'?'background:var(--driver);color:#fff':'color:var(--muted)'}" onclick="dTC('s','Bolt',this)">Bolt</div><div class="chip ${dTSrc==='Prywatny'?'active':''}" style="${dTSrc==='Prywatny'?'background:var(--driver);color:#fff':'color:var(--muted)'}" onclick="dTC('s','Prywatny',this)">Prywatny</div>`
            : `<div class="chip ${dTSrc==='Centrala'?'active':''}" style="${dTSrc==='Centrala'?'background:var(--driver);color:#fff':'color:var(--muted)'}" onclick="dTC('s','Centrala',this)">Centrala</div><div class="chip ${dTSrc==='Postój'?'active':''}" style="${dTSrc==='Postój'?'background:var(--driver);color:#fff':'color:var(--muted)'}" onclick="dTC('s','Postój',this)">Postój</div><div class="chip ${dTSrc==='Prywatny'?'active':''}" style="${dTSrc==='Prywatny'?'background:var(--driver);color:#fff':'color:var(--muted)'}" onclick="dTC('s','Prywatny',this)">Prywatny</div>`;
        
        let ch2 = d.plat === 'apps'
            ? `<div class="chip ${dTPay==='Online'?'active':''}" style="${dTPay==='Online'?'background:var(--info);color:#fff':'color:var(--muted)'}" onclick="dTC('p','Online',this)">Aplikacja</div><div class="chip ${dTPay==='Gotówka'?'active':''}" style="${dTPay==='Gotówka'?'background:var(--success);color:#000':'color:var(--muted)'}" onclick="dTC('p','Gotówka',this)">Gotówka</div>`
            : `<div class="chip ${dTPay==='Gotówka'?'active':''}" style="${dTPay==='Gotówka'?'background:var(--success);color:#000':'color:var(--muted)'}" onclick="dTC('p','Gotówka',this)">Gotówka</div><div class="chip ${dTPay==='Karta'?'active':''}" style="${dTPay==='Karta'?'background:var(--info);color:#fff':'color:var(--muted)'}" onclick="dTC('p','Karta',this)">Karta</div>`;

        let clientOpts = d.clients.map(c => `<option value="${c.id}">${c.n}</option>`).join('');

        let g=0, cf=0; if(d.sh.on) { d.sh.tr.forEach(x=>{ g+=x.v; if(x.p==='Karta') cf += x.v * d.cfg.cardF; }); }
        let pFee = d.cfg.eType === 'pct' ? g * d.cfg.ePct : 0; let n = g - (g * d.cfg.tax) - pFee - cf - d.cfg.fix; 
        
        // Logika Stopera
        let stoperHtml = '';
        if(d.sh.on) {
            if(d.liveRideStart) {
                let minsElapsed = Math.floor((Date.now() - d.liveRideStart) / 60000);
                stoperHtml = `<div class="panel" style="border-color:var(--danger); text-align:center; background:rgba(239,68,68,0.05); padding:30px 20px;"><div style="font-size:3rem; margin-bottom:10px;">⏳</div><h3 style="color:var(--danger); margin:0 0 5px 0; text-transform:uppercase;">Kurs w toku!</h3><p style="color:var(--muted); font-size:0.85rem; margin-bottom:20px;">Stoper włączony. Możesz zablokować ekran.</p><button class="btn btn-live" style="font-size:1.2rem; padding:25px;" onclick="stopLiveRide()">🔴 ZAKOŃCZ KURS</button></div>`;
            } else {
                stoperHtml = `<div class="panel" style="border-color:var(--success); text-align:center;"><button class="btn" style="background:var(--success); color:#000; font-size:1.2rem; padding:25px;" onclick="startLiveRide()">🟢 ROZPOCZNIJ KURS (STOPER)</button><p style="color:var(--muted); font-size:0.75rem; margin-top:15px;">Kliknij, gdy klient wsiądzie. Apka sama policzy czas.</p></div>`;
            }
        }

        let act = d.sh.on ? `<div class="dash-hero" style="padding-bottom:5px;"><p>ZYSK NETTO ZMIANY</p><h1 style="font-size:4rem; color:${n>=0?'var(--success)':'var(--danger)'};">${n.toFixed(2)} zł</h1></div>
        ${stoperHtml}
        <div class="panel" style="border-color:rgba(59, 130, 246, 0.4);"><div class="p-title" style="color:var(--driver);">➕ Zaksięguj nowy kurs</div><div class="form-section" style="padding:12px; margin-bottom:15px;"><div class="fs-title" style="margin-bottom:8px;">Źródło & Płatność</div><div class="chip-box" style="margin-bottom:10px; padding-bottom:0;">${ch1}</div><div class="chip-box" style="margin-bottom:0; padding-bottom:0;">${ch2}</div></div><div class="inp-group" style="margin-bottom:15px;"><label>Klient VIP (Opcjonalnie)</label><select id="dt-cid"><option value="">-- Zwykły kurs --</option>${clientOpts}</select></div><div class="form-section" style="padding:20px 15px; border-color:rgba(59,130,246,0.3); background:rgba(59,130,246,0.05);"><div class="fs-title" style="color:var(--driver); text-align:center; margin-bottom:15px;">Kwota (Brutto)</div><input type="number" id="dt-v" class="big-inp" placeholder="0.00" style="color:var(--driver); border:none; background:rgba(0,0,0,0.5); border-radius:16px;"></div><div class="inp-row"><div class="inp-group"><label>Czas (Min)</label><input type="number" id="dt-m" placeholder="np. 15"></div><div class="inp-group"><label>Dystans (KM)</label><input type="number" id="dt-k" placeholder="np. 8.5"></div></div><button class="btn btn-driver" style="margin-top:15px; font-size:1.1rem; padding:20px;" onclick="dAddT()">DODAJ KURS DO PORTFELA</button></div><div class="panel"><div class="p-title">Historia Zmiany</div>${d.sh.tr.map(x=>{ let icon = x.p==='Gotówka'?'💵':(x.p==='Karta'?'💳':'📱'); return `<div class="log-item" style="border-left-color:var(--driver); padding:15px;"><div style="display:flex; align-items:center; gap:15px;"><div style="font-size:1.5rem; background:rgba(255,255,255,0.05); padding:10px; border-radius:12px;">${icon}</div><div><strong style="font-size:1.2rem">${x.v.toFixed(2)} zł</strong><br><small style="color:var(--muted)">${x.s} • ${x.m||0} min • ${x.k||0}km</small></div></div><button class="btn-danger" style="padding:8px 12px; border:none; border-radius:8px; font-weight:bold; background:rgba(239,68,68,0.15);" onclick="dDelT(${x.id})">Cofnij</button></div>` }).join('')||'<div style="text-align:center;color:var(--muted);padding:30px 0;font-size:0.9rem;">Brak kursów.</div>'}</div><div class="panel" style="border-color:rgba(239,68,68,0.3); background:rgba(239,68,68,0.02)"><div class="p-title" style="color:var(--danger)">Zakończenie Dnia Pracy</div><div class="inp-group" style="margin-bottom:15px;"><label style="color:var(--danger)">Licznik po zjeździe (KM)</label><input type="number" id="de-o" class="big-inp" style="color:var(--danger); border-color:rgba(239,68,68,0.4); background:#000;"></div><button class="btn btn-danger" style="background:linear-gradient(135deg, #ef4444, #b91c1c); color:#fff; border:none; padding:20px;" onclick="dEndS()">ZAKOŃCZ ZMIANĘ</button></div>` : `<div class="dash-hero" style="padding-top:40px;"><div style="width:80px;height:80px;background:linear-gradient(135deg,var(--success),#059669);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:2.5rem;box-shadow:0 10px 25px rgba(34,197,94,0.3);">🚗</div><h1 style="font-size:2.5rem;">Cześć, ${db.userName}!</h1><p style="margin-top:10px;">Podaj stan licznika, aby otworzyć zmianę</p></div><div class="panel" style="border-color:var(--success); box-shadow:0 10px 30px rgba(34,197,94,0.1);"><div class="inp-group"><input type="number" id="ds-o" class="big-inp" placeholder="Licznik (KM)" style="font-size:2.5rem; padding:30px;"></div><button class="btn" style="background:linear-gradient(135deg, var(--success), #059669); color:#fff; font-size:1.2rem; padding:20px; margin-top:20px;" onclick="dStartS()">ROZPOCZNIJ PRACĘ</button></div>`;
        APP.innerHTML = hdr + act + nav;
    }

    if(t === 'stats') {
        let fM = db.filter || 'all'; let now = new Date(); let fs=[], fe=[];
        
        // Funkcja pomocnicza aby porownac daty w zaleznosci od wybranego filtra
        d.h.forEach(s => { 
            let sd=new Date(s.rD); 
            if(fM==='all') fs.push(s); 
            else if(fM==='today' && sd.toDateString()===now.toDateString()) fs.push(s); 
            else if(fM==='month' && sd.getMonth()===now.getMonth()&&sd.getFullYear()===now.getFullYear()) fs.push(s); 
            else if(fM==='week') { let diff=now.getDate()-now.getDay()+(now.getDay()===0?-6:1); let st=new Date(now.setDate(diff)); st.setHours(0,0,0,0); if(sd>=st) fs.push(s); } 
        });
        
        d.exp.forEach(e => { 
            let ed=new Date(e.rD); 
            if(fM==='all') fe.push(e); 
            else if(fM==='today' && ed.toDateString()===now.toDateString()) fe.push(e); 
            else if(fM==='month' && ed.getMonth()===now.getMonth()&&ed.getFullYear()===now.getFullYear()) fe.push(e); 
            else if(fM==='week') { let diff=now.getDate()-now.getDay()+(now.getDay()===0?-6:1); let st=new Date(now.setDate(diff)); st.setHours(0,0,0,0); if(ed>=st) fe.push(e); } 
        });
        
        let g=0, k=0, fc=0, tx=0, ex=0, pf=0, cf=0;
        fs.forEach(x=>{g+=x.g; k+=x.k; fc+=x.fc; tx+=x.tx; pf+=(x.pF||0); cf+=(x.cF||0);}); 
        fe.forEach(x=> { if(x.ty !== 'amort') ex+=x.v; });
        
        // Naprawione wyliczanie kosztów stałych - tylko za unikalne dni
        let uniqueDays = new Set(fs.map(s => new Date(s.rD).toLocaleDateString())).size;
        if(uniqueDays === 0 && d.sh.on && fM === 'today') uniqueDays = 1; // wlicza dzisiejszy dzien jesli zmiana otwarta
        let fix = uniqueDays * d.cfg.fix; 

        let n = g - fc - tx - fix - pf - cf - ex; 
        let rKm = k>0?(n/k):0;

        APP.innerHTML = hdr + `<div class="mode-switch" style="margin:15px; border-color:var(--border);"><div class="m-btn ${fM==='today'?'active':''}" onclick="db.filter='today';render()">Dziś</div><div class="m-btn ${fM==='week'?'active':''}" onclick="db.filter='week';render()">Tydzień</div><div class="m-btn ${fM==='month'?'active':''}" onclick="db.filter='month';render()">Miesiąc</div><div class="m-btn ${fM==='all'?'active':''}" onclick="db.filter='all';render()">Całość</div></div><div class="dash-hero" style="padding-top:0;"><p>TWOJE PRAWDZIWE NETTO</p><h1 style="color:${n>=0?'var(--success)':'var(--danger)'}; font-size:3.8rem;">${n.toFixed(2)} zł</h1></div><div class="grid-2"><div class="box"><span style="color:var(--info)">Zysk na 1 kilometr</span><strong style="color:#fff">${rKm.toFixed(2)} zł/km</strong></div><div class="box"><span style="color:var(--success)">Przepracowano</span><strong style="color:#fff">${uniqueDays} dni</strong></div></div><div class="panel" style="border-color:var(--border); padding:25px;"><div class="p-title">Wodospad Finansowy (P&L)</div><div class="fin-row"><span class="fin-label">Utarg Brutto z aplikacji</span><span class="fin-val" style="color:var(--success)">${g.toFixed(2)} zł</span></div><div class="fin-row"><span class="fin-label">Wydatki Garażowe</span><span class="fin-val" style="color:var(--danger)">-${ex.toFixed(2)} zł</span></div><div class="fin-row"><span class="fin-label">Paliwo z tras</span><span class="fin-val" style="color:var(--fuel)">-${fc.toFixed(2)} zł</span></div>${cf > 0 ? `<div class="fin-row"><span class="fin-label" style="color:var(--info)">Terminal</span><span class="fin-val" style="color:var(--danger)">-${cf.toFixed(2)} zł</span></div>` : ''}${pf > 0 ? `<div class="fin-row"><span class="fin-label">Prowizja Partnera</span><span class="fin-val" style="color:var(--danger)">-${pf.toFixed(2)} zł</span></div>` : ''}<div class="fin-row" style="align-items:flex-start;"><div style="display:flex; flex-direction:column; max-width:70%;"><span class="fin-label" style="color:#fff;">Koszty Stałe (Odpis)</span><small style="color:var(--muted); font-size:0.7rem; margin-top:4px; line-height:1.4;">Za przepracowane: <strong>${uniqueDays} dni</strong><br>Odpis: <strong>${d.cfg.fix.toFixed(2)} zł/dzień</strong><br>Auto: ${d.cfg.cC} | Baza: ${d.cfg.bC} | Inne: ${d.cfg.eC + d.cfg.iC}</small></div><span class="fin-val" style="color:var(--danger); padding-top:2px;">-${fix.toFixed(2)} zł</span></div><div class="fin-row" style="background:#09090b; margin-top:15px; padding:20px; border-radius:14px; border:1px solid var(--border);"><span class="fin-label" style="color:#fff; font-size:1.1rem;">CZYSTY ZYSK</span><span class="fin-val" style="font-size:1.5rem; color:${n>=0?'var(--success)':'var(--danger)'}">${n.toFixed(2)} zł</span></div></div><div class="panel"><div class="p-title">Struktura Kosztów</div><div style="height:200px; position:relative;"><canvas id="ch-doughnut"></canvas></div></div><div class="panel"><div class="p-title">Dziennik Zmian</div>${fs.map(x=>`<div class="log-item" style="border-left-color:${x.n>=0?'var(--success)':'var(--danger)'}; flex-direction:column; align-items:flex-start; padding:15px;"><div style="display:flex; justify-content:space-between; width:100%; margin-bottom:5px;"><strong style="font-size:1.1rem;">${x.dt}</strong><strong style="color:${x.n>=0?'var(--success)':'var(--danger)'}; font-size:1.2rem;">${x.n.toFixed(2)} zł</strong></div><small style="color:var(--muted)">Utarg: ${x.g.toFixed(2)} zł | Przebieg: ${x.k}km</small></div>`).join('')||'<div style="text-align:center;color:var(--muted);font-size:0.85rem;padding:20px 0;">Brak danych w tym przedziale.</div>'}</div>` + nav;
        
        setTimeout(() => { 
            if(window.dCh1) window.dCh1.destroy(); 
            let ctx1 = document.getElementById('ch-doughnut').getContext('2d'); 
            let labels = ['Paliwo', 'Wydatki', 'Podatek', 'Koszty Stałe']; 
            let data = [fc, ex, tx, fix]; 
            let colors = ['#f59e0b', '#ef4444', '#a855f7', '#3b82f6']; 
            if(pf > 0) { labels.push('Prowizja Partnera'); data.push(pf); colors.push('#10b981'); } 
            if(cf > 0) { labels.push('Terminal (Karty)'); data.push(cf); colors.push('#0ea5e9'); } 
            window.dCh1 = new Chart(ctx1, { type: 'doughnut', data: { labels: labels, datasets: [{ data: data, backgroundColor: colors, borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#a1a1aa', font: {size: 11, family:'Inter'} } } }, cutout: '75%' } }); 
        }, 100);
    }

    if(t === 'quote') {
        let q = d.q; let clientOpts = d.clients.map(c => `<option value="${c.id}" data-d="${c.d||0}">${c.n} (Rabat: ${c.d||0}%)</option>`).join('');
        APP.innerHTML = hdr + `<div class="dash-hero" style="padding-bottom:5px;"><p>KALKULATOR TRASY</p></div><div class="panel" style="border-color:rgba(217, 70, 239, 0.4)"><div class="mode-switch"><div class="m-btn ${dQM==='taxi'?'active':''}" style="${dQM==='taxi'?'background:var(--quote);color:#fff':''}" onclick="dQM='taxi';render()">Taksometr</div><div class="m-btn ${dQM==='fix'?'active':''}" style="${dQM==='fix'?'background:var(--quote);color:#fff':''}" onclick="dQM='fix';render()">Trasa Umowna</div></div><div class="inp-group" style="margin-bottom:15px;"><label>Klient VIP</label><select id="dq-c" onchange="dSetDisc()"><option value="">-- Brak --</option>${clientOpts}</select></div><div id="dq-t" class="${dQM==='taxi'?'':'hidden'}"><div class="chip-box" style="margin-bottom:15px;"><div class="chip ${!dQN?'active':''}" style="background:${!dQN?'rgba(217,70,239,0.1)':'var(--bg)'};color:${!dQN?'var(--quote)':'var(--muted)'}" onclick="dQN=false;render()">Dzień (T1/T3)</div><div class="chip ${dQN?'active':''}" style="background:${dQN?'rgba(217,70,239,0.1)':'var(--bg)'};color:${dQN?'var(--quote)':'var(--muted)'}" onclick="dQN=true;render()">Noc/Święto (T2/T4)</div></div><div class="inp-row"><div class="inp-group"><label>KM Miasto</label><input type="number" id="dqk1" oninput="dQC()"></div><div class="inp-group"><label>KM Poza</label><input type="number" id="dqk2" oninput="dQC()"></div></div><div class="inp-row"><div class="inp-group"><label>Korki (Min)</label><input type="number" id="dqm" oninput="dQC()"></div><div class="inp-group"><label>Rabat (%)</label><input type="number" id="dqd" value="0" oninput="dQC()"></div></div></div><div id="dq-f" class="${dQM==='fix'?'':'hidden'}"><div class="inp-row"><div class="inp-group"><label>Dystans 1-str (KM)</label><input type="number" id="dqfk" oninput="dQC()"></div><div class="inp-group"><label>Stawka (zł/km)</label><input type="number" id="dqfr" value="3.00" oninput="dQC()"></div></div></div><div style="background:#000; border-radius:16px; padding:20px; margin-top:20px; text-align:center; border:1px solid #222;"><p style="margin:0 0 5px 0; color:var(--quote); font-size:0.75rem; font-weight:800;">DO ZAPŁATY (BRUTTO)</p><h1 id="dqt" style="margin:0; font-size:3.5rem; letter-spacing:-2px;">0.00 zł</h1></div><button class="btn btn-quote" style="margin-top:15px;" onclick="dQB()">ZAKSIĘGUJ</button></div><div class="panel"><div class="p-title">Ustawienia Taryf</div><div class="grid-2"><div class="inp-group"><label>Start</label><input type="number" id="dcs" value="${q.s}"></div><div class="inp-group"><label>1h Postoju</label><input type="number" id="dcw" value="${q.w}"></div></div><div class="grid-4" style="grid-template-columns:1fr 1fr 1fr 1fr; gap:8px;"><div class="inp-group"><label>T1</label><input type="number" id="dct1" value="${q.t1}"></div><div class="inp-group"><label>T2</label><input type="number" id="dct2" value="${q.t2}"></div><div class="inp-group"><label>T3</label><input type="number" id="dct3" value="${q.t3}"></div><div class="inp-group"><label>T4</label><input type="number" id="dct4" value="${q.t4}"></div></div><button class="btn" style="background:#222; color:#fff;" onclick="dSaveQC()">ZAPISZ TARYFY</button></div>` + nav; setTimeout(dQC, 50);
    }

    if(t === 'garage') {
        let fS = calcFuelioStats();
        APP.innerHTML = hdr + `<div class="dash-hero" style="padding-bottom:5px;"><p>ŚREDNIE SPALANIE AUTA</p><h1 style="color:var(--fuel); font-size:3.5rem;">${fS.l1.toFixed(1)} <span style="font-size:1.5rem; color:var(--muted)">L/100</span></h1></div><div class="grid-2" style="padding:0 15px; margin-bottom:20px;"><div class="box" style="border-color:rgba(245,158,11,0.3); background:rgba(245,158,11,0.05); align-items:center;"><span style="color:var(--fuel)">Koszt 100 KM</span><strong style="color:#fff">${fS.c1.toFixed(2)} zł</strong></div><div class="box" style="border-color:rgba(245,158,11,0.3); background:rgba(245,158,11,0.05); align-items:center;"><span style="color:var(--fuel)">Bieżący Koszt 1 KM</span><strong style="color:#fff">${d.cfg.fuelPx.toFixed(2)} zł</strong></div></div><div class="panel" style="border-color:var(--fuel)"><div class="p-title" style="color:var(--fuel)">Dziennik Tankowań</div><div class="inp-row"><div class="inp-group"><label>Licznik Główny (KM)</label><input type="number" id="df-o"></div><div class="inp-group"><label>Wlane Litry</label><input type="number" id="df-l" step="0.1"></div></div><div class="inp-row"><div class="inp-group"><label>Rachunek (zł)</label><input type="number" id="df-v"></div><div class="inp-group"><label>Pod korek?</label><select id="df-f"><option value="1">Tak (Przelicz spalanie)</option><option value="0">Nie</option></select></div></div><button class="btn" style="background:var(--fuel); color:#000;" onclick="dAF()">ZAPISZ PARAGON</button></div><div class="panel" style="border-color:rgba(239,68,68,0.4)"><div class="p-title" style="color:var(--danger)">Inne Wydatki Operacyjne</div><div class="inp-row"><div class="inp-group" style="flex:2"><label>Kategoria Wydatku</label><select id="de-c"><option value="✨ Myjnia / Kosmetyka">✨ Myjnia / Kosmetyka</option><option value="🛠️ Serwis / Części">🛠️ Serwis / Części</option><option value="🛡️ Ubezpieczenie">🛡️ Ubezpieczenie</option><option value="📦 Inne koszty">📦 Inne koszty</option></select></div><div class="inp-group"><label>Kwota (zł)</label><input type="number" id="de-v" placeholder="0.00"></div></div><button class="btn btn-danger" style="background:var(--danger); color:#fff;" onclick="dAE()">ZAPISZ WYDATEK</button></div><div class="panel"><div class="p-title">Historia Garażu</div>${renderGarageHistory()}</div>` + nav;
    }

    if(t === 'crm') {
        APP.innerHTML = hdr + `<div class="dash-hero" style="padding-bottom:10px;"><p>BAZA KLIENTÓW VIP</p><h1 style="font-size:3rem;">${d.clients.length} <span style="font-size:1.5rem; color:var(--muted)">Osob.</span></h1></div><div class="panel" style="border-color:var(--driver);"><div class="p-title" style="color:var(--driver)">➕ Dodaj Klienta</div><div class="inp-row"><div class="inp-group"><label>Imię / Firma</label><input type="text" id="dc-n" placeholder="np. Hotel Qubus"></div></div><div class="inp-row"><div class="inp-group"><label>Telefon</label><input type="text" id="dc-p" placeholder="np. 500 000 000"></div><div class="inp-group"><label>Zniżka (%)</label><input type="number" id="dc-d" placeholder="np. 10"></div></div><button class="btn btn-driver" style="margin-top:10px;" onclick="dAddCrm()">ZAPISZ KLIENTA</button></div><div class="panel"><div class="p-title">Katalog Klientów</div>${d.clients.map(c => { return `<div class="log-item" style="border-left-color:var(--driver); flex-direction:column; align-items:flex-start; padding:18px;"><div><strong style="font-size:1.2rem; color:#fff">${c.n}</strong></div><div style="width:100%; display:flex; justify-content:space-between; align-items:center; margin-top:15px; padding-top:15px; border-top:1px solid rgba(255,255,255,0.05);"><div><span style="font-size:0.7rem; color:var(--muted); text-transform:uppercase; font-weight:800;">Rabat:</span><br><strong style="color:var(--info); font-size:1.1rem;">${c.d}%</strong></div><button class="btn-danger" style="padding:10px 14px; font-size:0.75rem; border:none; border-radius:10px; background:transparent;" onclick="dCrmDel(${c.id})">USUŃ</button></div></div>` }).join('') || '<div style="text-align:center;color:var(--muted);font-size:0.85rem;padding:20px;">Brak klientów.</div>'}</div>` + nav;
    }

    if(t === 'set') {
        APP.innerHTML = hdr + `<button class="btn" style="background:#222; color:#fff; border:1px solid #333; margin: 15px; width:calc(100% - 30px);" onclick="db.tab='term';render()">Powrót do aplikacji</button><div class="dash-hero" style="padding-bottom:0; padding-top:10px;"><p>KONTROLA TWOJEJ FIRMY</p></div><div class="panel" style="border-color:var(--success)"><div class="p-title" style="color:var(--success)">Personalizacja & Motywacja</div><div class="inp-row"><div class="inp-group"><label>Twoje Imię</label><input type="text" id="us-name" value="${db.userName}"></div><div class="inp-group"><label>Cel (zł)</label><input type="number" id="us-goal" value="${d.cfg.goal}"></div></div></div><div class="panel" style="border-color:var(--driver)"><div class="p-title" style="color:var(--driver)">Parametry Stałe</div><div class="inp-row"><div class="inp-group"><label>Koszt Auta (zł)</label><input type="number" id="us-cc" value="${d.cfg.cC}"></div><div class="inp-group"><label>Okres</label><select id="us-ctype" style="width:100%;padding:16px;background:#09090b;border:1px solid var(--border);color:#fff;border-radius:14px;"><option value="week" ${d.cfg.cType==='week'?'selected':''}>Tygodniowo</option><option value="month" ${d.cfg.cType==='month'?'selected':''}>Miesięcznie</option></select></div></div><div class="inp-row"><div class="inp-group"><label>Baza / Korpo zł/mc</label><input type="number" id="us-bc" value="${d.cfg.bC}"></div><div class="inp-group"><label>Inne Stałe zł/mc</label><input type="number" id="us-ic" value="${d.cfg.iC || 0}"></div></div><div style="border-top:1px solid #333; margin:15px 0; padding-top:15px;"><label style="font-size:0.7rem; color:var(--info); font-weight:bold; margin-bottom:8px; display:block;">ZUS ORAZ PARTNER</label><select id="us-etype" onchange="dTogglePType('us')" style="width:100%;padding:16px;background:#09090b;border:1px solid var(--border);color:#fff;border-radius:14px;margin-bottom:10px;"><option value="flat" ${d.cfg.eType==='flat'?'selected':''}>Stała kwota (ZUS)</option><option value="pct" ${d.cfg.eType==='pct'?'selected':''}>Procent (Prowizja Partnera)</option></select><div id="us-p-flat-box" style="display:${d.cfg.eType==='flat'?'block':'none'}"><input type="number" id="us-ec" value="${d.cfg.eC}" style="width:100%;padding:16px;background:#09090b;border:1px solid var(--border);color:#fff;border-radius:14px;"></div><div id="us-p-pct-box" style="display:${d.cfg.eType==='pct'?'block':'none'}"><input type="number" id="us-epct" value="${(d.cfg.ePct*100).toFixed(0)}" style="width:100%;padding:16px;background:#09090b;border:1px solid var(--driver);color:var(--driver);border-radius:14px;font-weight:bold;"></div></div><div class="inp-row"><div class="inp-group"><label>Podatek (%)</label><input type="number" id="us-tx" value="${(d.cfg.tax*100).toFixed(1)}" step="0.1"></div><div class="inp-group"><label>Terminal (%)</label><input type="number" id="us-cf" value="${(d.cfg.cardF*100).toFixed(1)}" step="0.1" style="color:var(--info); border-color:rgba(14,165,233,0.5);"></div></div><div style="background:var(--bg); padding:15px; border-radius:12px; margin:15px 0; text-align:center;"><small style="color:var(--muted)">Twoja Dniówka stała wynosi:</small><br><strong style="color:var(--danger); font-size:1.5rem;">${d.cfg.fix.toFixed(2)} zł / dzień</strong></div><button class="btn btn-driver" onclick="dSaveUS()">ZAKTUALIZUJ KOSZTY</button></div><div class="panel" style="border-color:var(--quote)"><div class="p-title" style="color:var(--quote)">Kopie Zapasowe</div><div class="grid-2" style="margin-bottom:0;"><button class="btn" style="background:rgba(255,255,255,0.1); color:#fff; border:1px solid var(--border);" onclick="exportDb()">💾 Pobierz</button><button class="btn" style="background:rgba(255,255,255,0.1); color:#fff; border:1px solid var(--border);" onclick="importDb()">📂 Wgraj</button></div></div>`;
    }
}

// STOPPER LOGIC (BEZ ROZSYPYWANIA)
function startLiveRide(){db.drv.liveRideStart=Date.now();save();render();}
function stopLiveRide(){
    let m=Math.round((Date.now()-db.drv.liveRideStart)/60000); if(m<1)m=1;
    db.drv.liveRideStart=null; save(); render();
    setTimeout(()=>{
        let iM=document.getElementById('dt-m'); let iV=document.getElementById('dt-v');
        if(iM){iM.value=m; iM.classList.add('highlight-input'); setTimeout(()=>iM.classList.remove('highlight-input'),1500);}
        if(iV) { iV.focus(); } // Usunięto agresywny scroll powodujący błędy UI
    },50);
}

// TAXI LOGIC
function dTC(t,v,el) { if(t==='s') dTSrc=v; else dTPay=v; el.parentElement.querySelectorAll('.chip').forEach(c=>{ c.style.background='rgba(255,255,255,0.05)'; c.style.color='var(--muted)'; }); if(v==='Gotówka') { el.style.background='var(--success)'; el.style.color='#000'; } else if(v==='Karta') { el.style.background='var(--info)'; el.style.color='#fff'; } else { el.style.background='var(--driver)'; el.style.color='#fff'; } }
function dStartS() { let o=safeVal('ds-o'); if(!o) return; db.drv.odo=o; db.drv.sh={on:true, o, t:Date.now(), tr:[]}; db.drv.liveRideStart=null; save(); render(); }
function dQC() { let q=db.drv.q; let fC=db.drv.cfg.fuelPx; let tax=db.drv.cfg.tax; let v=0,k=0,m=0,f=0; if(dQM==='taxi') { let k1=safeVal('dqk1'); let k2=safeVal('dqk2'); m=safeVal('dqm'); let disc=safeVal('dqd'); k=k1+k2; let base=q.s+(k1*(dQN?q.t2:q.t1))+(k2*(dQN?q.t4:q.t3))+(m*(q.w/60)); v=base-(base*(disc/100)); } else { k=safeVal('dqfk'); let r=safeVal('dqfr', 3.00); v=k*r; } dQK=k; dQM_T=m; dQV=v; let elT=document.getElementById('dqt'); if(elT)elT.innerText=v.toFixed(2)+" zł"; }
function dQB() { if(!db.drv.sh.on) return alert("Otwórz zmianę!"); if(dQV>0) { db.drv.sh.tr.unshift({id:Date.now(),v:dQV,k:dQK,m:dQM_T,s:'Wycena',p:'Gotówka'}); save(); db.tab='term'; render(); } }
function dSaveQC() { db.drv.q = { s:safeVal('dcs'), w:safeVal('dcw'), t1:safeVal('dct1'), t2:safeVal('dct2'), t3:safeVal('dct3'), t4:safeVal('dct4') }; save(); alert("Zapisano Taryfy!"); }
function calcFuelioStats() { let l=db.drv.fuel; let s={l1:0,c1:0,ck:db.drv.cfg.fuelPx}; if(l.length>=2){ let lF=l.findIndex(x=>x.isF===1); if(lF!==-1){ let pF=l.findIndex((x,i)=>i>lF&&x.isF===1); if(pF!==-1){ let d=l[lF].o-l[pF].o; if(d>0){ let tL=0,tC=0; for(let i=lF;i<pF;i++){tL+=l[i].l;tC+=l[i].v;} s.l1=(tL/d)*100; s.c1=(tC/d)*100; s.ck=tC/d; db.drv.cfg.fuelPx=s.ck; save(); } } } } return s; }
function dAF() { let o=safeVal('df-o'); let l=safeVal('df-l'); let v=safeVal('df-v'); let fEl=document.getElementById('df-f'); let f=fEl?parseInt(fEl.value):1; if(!o||!l||!v)return alert("Wypełnij dane!"); db.drv.odo=o; db.drv.fuel.unshift({o,l,v,isF:f}); db.drv.exp.unshift({id:Date.now(), rD:new Date().toISOString(), d:`⛽ Paliwo ${l}L`, v, dt:new Date().toLocaleDateString(), ty:'f'}); save(); render(); }
function dAE() { let v=safeVal('de-v'); let cEl=document.getElementById('de-c'); let c=cEl?cEl.value:'Wydatki'; if(v) { db.drv.exp.unshift({id:Date.now(), rD:new Date().toISOString(), d:c, v, dt:new Date().toLocaleDateString(), ty:'e'}); save(); render(); } }
function renderGarageHistory() { return db.drv.exp.map(x => { let isF = x.ty==='f'; let col = isF ? 'var(--fuel)' : 'var(--danger)'; return `<div class="log-item" style="border-left-color:${col}"><div><strong style="color:#fff; font-size:1.05rem;">${x.d}</strong><br><small style="color:var(--muted)">${x.dt}</small></div><strong style="color:${col}">-${x.v.toFixed(2)} zł</strong></div>`; }).join('') || '<div style="text-align:center;color:var(--muted);padding:10px;font-size:0.8rem;">Brak wpisów.</div>'; }
function dAddT() { let v=safeVal('dt-v'); let k=safeVal('dt-k'); let m=safeVal('dt-m'); let cIdel=document.getElementById('dt-cid'); let cId=cIdel ? parseInt(cIdel.value)||null : null; if(!v)return; db.drv.sh.tr.unshift({id:Date.now(),v,k,m,s:dTSrc,p:dTPay,c:cId}); save(); render(); }
function dDelT(id) { db.drv.sh.tr=db.drv.sh.tr.filter(x=>x.id!==id); save(); render(); }
function dEndS() { let e=safeVal('de-o'); if(!e||e<=db.drv.sh.o) return alert("Sprawdź licznik końcowy!"); let g=0; let pk=0; let cf=0; db.drv.sh.tr.forEach(x=>{ g+=x.v; pk+=x.k; if(x.p==='Karta') cf += x.v * db.drv.cfg.cardF; }); let k=e-db.drv.sh.o; let fc=k*db.drv.cfg.fuelPx; let tax=g*db.drv.cfg.tax; let pFee = db.drv.cfg.eType === 'pct' ? g * db.drv.cfg.ePct : 0; let n=g-fc-tax-pFee-cf-db.drv.cfg.fix; db.drv.odo=e; db.drv.h.unshift({id:Date.now(), rD:new Date().toISOString(), dt:new Date().toLocaleDateString(), g, n, k, pk, fc, tx:tax, pF:pFee, cF:cf, tr:[...db.drv.sh.tr]}); db.drv.sh.on=false; db.drv.sh.tr=[]; db.drv.liveRideStart=null; save(); db.tab='stats'; render(); }
function dSaveUS() { db.userName = document.getElementById('us-name').value; db.drv.cfg.goal = safeVal('us-goal', 350); db.drv.cfg.cC = safeVal('us-cc'); db.drv.cfg.cType = document.getElementById('us-ctype').value; db.drv.cfg.bC = safeVal('us-bc'); db.drv.cfg.iC = safeVal('us-ic'); db.drv.cfg.tax = safeVal('us-tx') / 100; db.drv.cfg.cardF = safeVal('us-cf') / 100; let eTy = document.getElementById('us-etype').value; db.drv.cfg.eType = eTy; if(eTy === 'flat') { db.drv.cfg.eC = safeVal('us-ec'); db.drv.cfg.ePct = 0; } else { db.drv.cfg.eC = 0; db.drv.cfg.ePct = safeVal('us-epct') / 100; } let dailyCar = (db.drv.cfg.cType === 'week') ? (db.drv.cfg.cC / 7) : (db.drv.cfg.cC / 30); let dailyOther = (db.drv.cfg.eC + db.drv.cfg.bC + db.drv.cfg.iC) / 30; db.drv.cfg.fix = dailyCar + dailyOther; save(); render(); alert('Ustawienia zapisane!'); }
function dAddCrm() { let n = document.getElementById('dc-n').value; let ph = document.getElementById('dc-p').value; let d = safeVal('dc-d'); if(n) { db.drv.clients.unshift({id:Date.now(), n, ph, d, bl: false}); save(); render(); } }
function dCrmDel(id) { if(confirm("Usunąć klienta z bazy?")) { db.drv.clients = db.drv.clients.filter(x=>x.id!==id); save(); render(); } }

render();
</script>
</body>
</html>
