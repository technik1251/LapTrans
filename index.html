<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LapTrans OS Premium</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap');
        
        :root {
            --bg-body: #000000; --bg-app: #09090b; 
            --card: rgba(24, 24, 27, 0.7); --card-hover: rgba(39, 39, 42, 0.9);
            --border: rgba(255, 255, 255, 0.12); --text: #ffffff; --muted: #a1a1aa;
            --driver: #3b82f6; --life: #14b8a6; --success: #10b981; --danger: #ef4444; 
            --warning: #f59e0b; --info: #0ea5e9; --quote: #d946ef; --fuel: #f97316; --plan: #a855f7;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-body); color: var(--text); margin: 0; padding: 0; width: 100vw; min-height: 100vh; overflow-x: hidden; display: flex; justify-content: center; }
        
        .app-container { width: 100%; max-width: 100%; background: var(--bg-app); min-height: 100vh; padding-bottom: 120px; position: relative; display: flex; flex-direction: column; }
        @media (min-width: 768px) {
            body { background: radial-gradient(circle at top, #121214 0%, #000 100%); padding: 20px 0; }
            .app-container { max-width: 900px; min-height: 95vh; border-radius: 40px; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 25px 50px rgba(0,0,0,0.9); overflow-y: auto; padding-bottom: 140px; }
            .nav-dock { max-width: 860px !important; bottom: 40px !important; padding: 15px 30px !important; border-radius: 40px !important; }
            .grid-responsive { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        }

        .wiz-bg { position: fixed; top: 0; left: 0; right: 0; height: 70vh; background: radial-gradient(circle at 50% -20%, rgba(59, 130, 246, 0.15) 0%, transparent 80%); z-index: -1; pointer-events: none; transition: background 1s ease; }
        .view-enter { animation: viewFadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes viewFadeIn { from { opacity: 0; transform: translateY(30px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

        header { padding: 20px 24px; background: rgba(9, 9, 11, 0.8); position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border-bottom: 1px solid var(--border); }
        .brand-logo { display: flex; align-items: center; gap: 10px; cursor: pointer; transition: transform 0.2s; }
        .brand-logo:active { transform: scale(0.92); }
        .logo-text { font-weight: 800; font-size: 1.4rem; letter-spacing: -0.5px; display:flex; align-items:center; gap:5px; }
        .logo-arrow { font-size: 0.7rem; color: var(--muted); margin-left: 2px; }

        .settings-btn { width: 45px; height: 45px; border-radius: 16px; background: var(--card); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; color: var(--text); }
        .settings-btn svg { width: 22px; height: 22px; stroke: var(--text); }
        .settings-btn:active { transform: scale(0.9); background: var(--card-hover); }
        .top-badge { background: var(--card); border: 1px solid var(--border); padding: 10px 18px; border-radius: 20px; font-weight: 800; font-size: 0.85rem; display:flex; align-items:center; gap:6px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        .panel { background: var(--card); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 32px; margin: 16px; padding: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .p-title { font-size: 0.8rem; font-weight: 800; color: var(--muted); text-transform: uppercase; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; letter-spacing: 1.5px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        
        .dash-hero { text-align: center; padding: 40px 20px 20px; }
        .dash-hero p { margin: 0 0 10px 0; font-size: 0.8rem; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 3px; }
        .dash-hero h1 { margin: 0; font-size: 4.2rem; font-weight: 900; letter-spacing: -2px; line-height: 1; text-shadow: 0 10px 40px rgba(0,0,0,0.8); }

        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; padding: 0 15px; margin-bottom:20px; }
        .box { background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 20px; border-radius: 24px; display: flex; flex-direction: column; justify-content: center; box-shadow: inset 0 2px 10px rgba(0,0,0,0.2); }
        .box span { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; font-weight: 800; margin-bottom: 8px; letter-spacing: 1px; }
        .box strong { font-size: 1.5rem; font-weight: 900; letter-spacing: -1px; color: #fff; }

        .inp-row { display: flex; gap: 15px; margin-bottom: 16px; flex-wrap: wrap; }
        .inp-group { flex: 1; min-width: 120px; display: flex; flex-direction: column; }
        .inp-group label { font-size: 0.75rem; color: var(--muted); font-weight: 800; margin-bottom: 8px; padding-left: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .inp-group input, .inp-group select { background: rgba(0,0,0,0.6); border: 1px solid var(--border); color: #fff; padding: 20px; border-radius: 20px; font-size: 1.15rem; font-weight: 600; outline: none; transition: 0.3s; font-family: inherit; box-shadow: inset 0 2px 8px rgba(0,0,0,0.5); }
        .inp-group input:focus, .inp-group select:focus { border-color: var(--driver); background: rgba(59,130,246,0.1); box-shadow: 0 0 0 4px rgba(59,130,246,0.2); }
        .big-inp { font-size: 2.5rem !important; padding: 30px !important; font-weight: 900 !important; text-align: center !important; letter-spacing: -2px; border-radius: 28px !important; }

        .btn { width: 100%; padding: 22px; border-radius: 24px; border: none; font-weight: 800; font-size: 1.1rem; cursor: pointer; text-transform: uppercase; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); letter-spacing: 1px; font-family: inherit; display:flex; justify-content:center; align-items:center; gap:8px;}
        .btn:active { transform: scale(0.95); }
        .btn-driver { background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: #fff; box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4); border: 1px solid rgba(255,255,255,0.1); } 
        .btn-home { background: linear-gradient(135deg, #14b8a6, #0f766e); color: #fff; box-shadow: 0 10px 30px rgba(20, 184, 166, 0.4); border: 1px solid rgba(255,255,255,0.1); } 
        .btn-danger { background: linear-gradient(135deg, #ef4444, #b91c1c); color: #fff; box-shadow: 0 10px 30px rgba(239, 68, 68, 0.4); border: 1px solid rgba(255,255,255,0.1); }
        .btn-success { background: linear-gradient(135deg, #10b981, #047857); color: #fff; box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4); border: 1px solid rgba(255,255,255,0.1); }

        .h-scroll { display: flex; gap: 15px; overflow-x: auto; padding: 5px 15px 20px; scrollbar-width: none; scroll-snap-type: x mandatory; }
        .h-scroll::-webkit-scrollbar { display: none; }
        .card-item { min-width: 280px; scroll-snap-align: center; background: linear-gradient(145deg, #18181b, #09090b); border: 1px solid var(--border); border-radius: 32px; padding: 25px; box-shadow: 0 15px 30px rgba(0,0,0,0.5); position: relative; overflow: hidden; }
        .card-item::before { content:''; position:absolute; top:-50%; right:-50%; width:200px; height:200px; background:radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%); border-radius:50%; }

        .nav-dock { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 440px; background: rgba(24, 24, 27, 0.9); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.15); border-radius: 40px; display: flex; justify-content: space-around; align-items: center; padding: 10px 15px; z-index: 1000; box-shadow: 0 25px 50px rgba(0,0,0,0.9); }
        .nav-item { color: var(--muted); text-align: center; font-size: 0.65rem; font-weight: 800; cursor: pointer; flex: 1; transition: 0.3s; text-transform: uppercase; letter-spacing: 0.5px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .nav-item svg { width: 24px; height: 24px; margin-bottom: 5px; stroke: var(--muted); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
        .nav-item.active { color: var(--text); }
        .nav-item.active svg { stroke: var(--driver); transform: translateY(-6px) scale(1.15); filter: drop-shadow(0 5px 10px rgba(59,130,246,0.8)); }
        .nav-item.act-home.active svg { stroke: var(--life); filter: drop-shadow(0 5px 10px rgba(20,184,166,0.8)); }
        
        .fab-wrapper { position: relative; width: 65px; display: flex; justify-content: center; }
        .fab-btn { width: 66px; height: 66px; border-radius: 50%; background: linear-gradient(135deg, var(--life), #0d9488); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 300; position: absolute; bottom: -8px; box-shadow: 0 15px 35px rgba(20,184,166,0.6); cursor: pointer; border: 6px solid var(--bg-app); transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .fab-btn svg { width: 28px; height: 28px; stroke: #fff; stroke-width: 2.5; fill:none; stroke-linecap: round; stroke-linejoin: round; }
        .fab-btn:active { transform: scale(0.9); }

        .log-item { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 24px; padding: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .log-item:active { transform: scale(0.98); }
        .section-lbl { font-size: 0.85rem; color: var(--muted); font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin: 35px 20px 15px; }

        .custom-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 99999; display: flex; align-items: center; justify-content: center; padding: 20px; animation: fadeIn 0.3s ease-out; }
        .custom-modal-box { background: linear-gradient(145deg, #18181b, #000); border: 1px solid rgba(255,255,255,0.15); border-radius: 40px; width: 100%; max-width: 380px; padding: 40px 30px; text-align: center; box-shadow: 0 40px 80px rgba(0,0,0,0.9); animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .shake-anim { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        .hidden { display: none !important; }

        .wiz-screen { display: none; padding: 30px; min-height: 100vh; flex-direction: column; justify-content: center; animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .wiz-screen.active { display: flex; }
        .wiz-title { font-size: 3rem; font-weight: 900; margin-bottom: 10px; letter-spacing: -2px; text-align: center; line-height: 1.1; }
        .wiz-sub { color: var(--muted); text-align: center; margin-bottom: 40px; font-size: 1.1rem; font-weight: 600; line-height: 1.5; }
        .opt-card { background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); border-radius: 28px; padding: 25px; margin-bottom: 15px; cursor: pointer; display: flex; align-items: center; transition: 0.3s; box-shadow: inset 0 2px 10px rgba(0,0,0,0.3); }
        .opt-card.selected { border-color: var(--driver); background: rgba(59,130,246,0.15); box-shadow: 0 15px 35px rgba(59,130,246,0.4); }
        .opt-icon { font-size: 2.5rem; margin-right: 20px; background: rgba(0,0,0,0.6); width: 75px; height: 75px; display: flex; align-items: center; justify-content: center; border-radius: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .opt-card.selected .opt-icon { background: var(--driver); }
        
        /* Wzmocniony input w kreatorze dla lepszej widoczności */
        .premium-input { background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.2); color: #fff; font-size: 2rem; font-weight: 900; text-align: center; padding: 25px; border-radius: 28px; width: 100%; transition: 0.3s; box-shadow: inset 0 5px 15px rgba(0,0,0,0.5), 0 5px 20px rgba(0,0,0,0.3); letter-spacing: -1px; margin-bottom: 20px; }
        .premium-input:focus { border-color: var(--driver); background: rgba(59,130,246,0.15); box-shadow: 0 0 30px rgba(59,130,246,0.5); outline: none; }
        
        .form-section { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); padding: 20px; border-radius: 24px; box-shadow: inset 0 2px 10px rgba(0,0,0,0.2); }

        .progress-bg { width: 100%; height: 14px; background: rgba(255,255,255,0.08); border-radius: 7px; overflow: hidden; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); margin-top: 15px; }
        .progress-fill { height: 100%; border-radius: 7px; transition: width 1s cubic-bezier(0.16, 1, 0.3, 1); }
        
        .chip-box { display: flex; gap: 10px; overflow-x: auto; margin-bottom: 20px; padding-bottom: 5px; scrollbar-width: none; } .chip-box::-webkit-scrollbar { display: none; }
        .chip { padding: 15px 20px; background: var(--card-light); border: 1px solid var(--border); color: var(--muted); border-radius: 16px; font-size: 0.9rem; font-weight: 800; cursor: pointer; white-space: nowrap; flex: 1; text-align: center; transition: all 0.2s; }
        .chip.active { background: linear-gradient(135deg, var(--driver), #1e3a8a); color: #fff; border-color: transparent; box-shadow: 0 6px 20px rgba(59,130,246,0.4); transform: scale(1.02); }
        .chip.active-success { background: linear-gradient(135deg, var(--success), #15803d); color: #fff; border-color: transparent; box-shadow: 0 6px 20px rgba(34,197,94,0.4); transform: scale(1.02); }
        
        .mode-switch { display: flex; background: rgba(0,0,0,0.8); border-radius: 18px; border: 1px solid var(--border); padding: 8px; margin-bottom: 20px; box-shadow: inset 0 2px 8px rgba(0,0,0,0.6); }
        .mode-switch .m-btn { flex: 1; text-align: center; padding: 14px; font-size: 0.8rem; font-weight: 800; text-transform: uppercase; cursor: pointer; border-radius: 14px; color: var(--muted); transition: 0.3s; }
        .mode-switch .m-btn.active { background: var(--card-light); color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
        .mode-switch .m-btn.active-blue { background: var(--driver); color: #fff; box-shadow: 0 4px 15px rgba(59,130,246,0.4); border: 1px solid rgba(255,255,255,0.1); }
        
        .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 25px; }
        .cat-item { background: var(--card); border: 2px solid transparent; border-radius: 20px; padding: 18px 5px; text-align: center; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .cat-item.active { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.5); transform: scale(1.05); box-shadow: 0 8px 25px rgba(255,255,255,0.15); }
        .cat-icon { font-size: 2.2rem; margin-bottom: 10px; display: block; transition:transform 0.3s;} .cat-item.active .cat-icon { transform: scale(1.2); }
        .cat-lbl { font-size: 0.65rem; font-weight: 800; color: var(--muted); text-transform: uppercase; line-height: 1.2; word-wrap: break-word; }
        
        .fin-row { display: flex; justify-content: space-between; padding: 16px 0; border-bottom: 1px dashed rgba(255,255,255,0.1); font-size: 1rem; align-items: center; } .fin-row:last-child { border-bottom: none; }
        .fin-label { color: var(--muted); font-weight: 600; } .fin-val { font-weight: 800; font-size: 1.15rem; }
        
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.5); } 70% { box-shadow: 0 0 0 25px rgba(34,197,94,0); } 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); } }
        .btn-live { animation: pulse 2s infinite; background: linear-gradient(135deg, #10b981, #059669); color: #fff; border: 2px solid #34d399; font-size: 1.2rem; padding: 25px; }
        .highlight-input { border-color: var(--success) !important; background: rgba(34, 197, 94, 0.1) !important; transition: 0.5s; box-shadow: 0 0 20px rgba(34,197,94,0.3) !important; }
        
        .leaflet-layer, .leaflet-control-zoom-in, .leaflet-control-zoom-out, .leaflet-control-attribution { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
        .leaflet-container { background: #000; border-radius: 24px; border: 1px solid var(--border); box-shadow: inset 0 4px 15px rgba(0,0,0,0.8); }

        .icon-logo { width: 32px; height: 32px; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        .hero-card { background: linear-gradient(145deg, rgba(24,24,27,0.8), #000); border: 1px solid rgba(255,255,255,0.15); border-radius: 36px; padding: 40px 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.8); position: relative; overflow: hidden; margin: 0 15px 20px;}
        .hero-card::before { content:''; position:absolute; top:-50%; left:-50%; width:200px; height:200px; background:radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%); border-radius:50%; }
        
        /* Wykresy canvas z lepszym paddingiem */
        .chart-wrapper { height: 250px; position: relative; margin-bottom: 25px; background: rgba(0,0,0,0.3); border-radius: 20px; padding: 10px; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<div class="wiz-bg" id="main-bg"></div>
<div id="app" class="app-container"></div>

<div id="m-switcher" class="modal-overlay hidden">
    <div class="custom-modal-box" style="border-top: 6px solid var(--driver);">
        <div style="margin-bottom:20px;">
            <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="var(--driver)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
        </div>
        <h3 style="color:#fff; margin:0 0 25px 0; font-size:1.8rem; font-weight:900; letter-spacing:-1px;">Eko-System</h3>
        <div id="switcher-btns" style="display:flex; flex-direction:column; gap:15px;"></div>
        <button class="btn" style="background:transparent; border:1px solid rgba(255,255,255,0.2); color:var(--muted); margin-top:30px; box-shadow:none;" onclick="document.getElementById('m-switcher').classList.add('hidden'); window.vib();">ZAMKNIJ</button>
    </div>
</div>

<script>
// ==========================================
// 1. SILNIK I BAZA
// ==========================================
window.vib = (ms=40) => { if(navigator.vibrate) navigator.vibrate(ms); };
window.animNum = (id, start, end, duration) => { let obj = document.getElementById(id); if(!obj) return; let startTimestamp = null; const step = (timestamp) => { if(!startTimestamp) startTimestamp = timestamp; const progress = Math.min((timestamp - startTimestamp) / duration, 1); const easeProgress = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress); obj.innerHTML = (start + (end - start) * easeProgress).toFixed(2) + ' zł'; if(progress < 1) window.requestAnimationFrame(step); }; window.requestAnimationFrame(step); };
window.showModal = (type, title, text, placeholder, callback) => { window.vib(); let ex = document.getElementById('custom-modal-root'); if(ex) ex.remove(); let overlay = document.createElement('div'); overlay.id = 'custom-modal-root'; overlay.className = 'custom-modal-overlay'; let icon = type==='success'?'<svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>':(type==='prompt'?'<svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="var(--info)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>':(type==='confirm'?'<svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="var(--warning)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>':'<svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>')); let color = type==='success'?'var(--success)':(type==='prompt'?'var(--info)':(type==='confirm'?'var(--warning)':'var(--danger)')); let inputHtml = type==='prompt' ? `<input type="text" id="modal-input" class="premium-input" style="font-size:1.2rem; padding:20px; margin:20px 0; background:rgba(0,0,0,0.5);" placeholder="${placeholder}">` : ''; let btn1 = `<button class="btn" style="background:${color}; color:${type==='confirm'?'#000':'#fff'}; flex:1; margin:0; box-shadow:0 10px 25px ${color}44;" id="modal-btn-confirm">${type==='prompt'||type==='confirm'?'POTWIERDŹ':'OK'}</button>`; let btn2 = (type==='confirm'||type==='prompt') ? `<button class="btn" style="background:transparent; border:1px solid var(--border); color:var(--muted); flex:1; margin:0; box-shadow:none;" id="modal-btn-cancel">ANULUJ</button>` : ''; overlay.innerHTML = `<div class="custom-modal-box" style="border-top: 6px solid ${color};"><div style="margin-bottom:20px;">${icon}</div><h3 style="color:#fff; margin:0 0 10px 0; font-size:1.6rem; font-weight:900; letter-spacing:-1px;">${title}</h3><p style="color:var(--muted); font-size:1.05rem; margin-bottom:25px; line-height:1.5;">${text}</p>${inputHtml}<div style="display:flex; gap:15px; margin-top:10px;">${btn2}${btn1}</div></div>`; document.body.appendChild(overlay); if(type === 'prompt') setTimeout(() => document.getElementById('modal-input').focus(), 100); document.getElementById('modal-btn-confirm').onclick = () => { window.vib(); let val = type==='prompt' ? document.getElementById('modal-input').value : true; overlay.remove(); if(callback) callback(val); }; let cBtn = document.getElementById('modal-btn-cancel'); if(cBtn) cBtn.onclick = () => { window.vib(); overlay.remove(); if(callback) callback(type==='prompt'?null:false); }; };

r:pointer;" onclick="window.changeTab('acc')"><span style="font-size:2rem; color:var(--muted)">+</span></div></div><div class="section-lbl">Ostatnia Aktywność</div><div class="grid-responsive" style="padding:0 15px;">${[...h.trans].sort((a,b)=>new Date(b.rD)-new Date(a.rD)).slice(0,6).map(x => { let isExp = x.type==='exp'; let isTrans = x.type==='transfer'; let cd = isExp ? window.C_EXP[x.cat]||{c:'#ef4444',i:'💸'} : (isTrans ? {c:'#8b5cf6',i:'🔄'} : window.C_INC[x.cat]||{c:'#22c55e',i:'💵'}); let accN = isTrans?`Z: ${h.accs.find(a=>a.id===x.fromAcc)?.n}`:(h.accs.find(a=>a.id===x.acc)?.n||'Konto'); return `<div class="log-item"><div style="display:flex; align-items:center; gap:15px;"><div style="width:50px; height:50px; border-radius:16px; background:${cd.c}22; display:flex; align-items:center; justify-content:center; font-size:1.6rem; color:${cd.c};">${cd.i}</div><div><strong style="font-size:1.1rem; color:#fff;">${isTrans?'Przelew':x.cat}</strong><br><small style="color:var(--muted);">${accN} • ${x.dt}</small></div></div><strong style="color:${isExp?'#fff':'var(--success)'}; font-size:1.3rem;">${isExp?'-':(isTrans?'':'+')}${x.v.toFixed(0)} zł</strong></div>`; }).join('') || `<div style="text-align:center; padding:30px; color:var(--muted);">Cisza na koncie.</div>`}</div>` + nav;

<div style="font-size:1.6rem; background:rgba(255,255,255,0.05); padding:12px; border-radius:16px;">${x.p==='Gotówka'?'💵':'📱'}</div><div><strong style="font-size:1.2rem; color:#fff;">${x.v.toFixed(2)} zł</strong><br><small style="color:var(--muted);">${x.s} • ${x.k||0}km</small></div></div><span style="color:var(--danger); font-size:1.5rem; cursor:pointer; padding:5px;" onclick="window.dDelT(${x.id})">✖</span></div>`).join('') || '<div style="text-align:center; color:var(--muted); padding:20px;">Brak kursów.</div>'}</div><div class="panel" style="border-color:rgba(239,68,68,0.3); background:rgba(239,68,68,0.05); margin-top:20px;"><div class="inp-group" style="margin-bottom:15px;"><label style="color:var(--danger)">Licznik Zjazdowy (KM)</label><input type="number" id="de-o" class="big-inp" style="color:var(--danger); background:#000; padding:15px!important;" placeholder="np. ${d.odo + 150}"></div><button class="btn btn-danger" onclick="window.dEndS()">ZAKOŃCZ ZMIANĘ</button></div></div></div>` : `<div class="dash-hero" style="padding-top:80px;"><div style="width:100px;height:100px;background:linear-gradient(135deg,var(--success),#059669);border-radius:32px;display:flex;align-items:center;justify-content:center;margin:0 auto 30px;font-size:3.5rem;box-shadow:0 20px 40px rgba(34,197,94,0.4); transform:rotate(5deg);">🚕</div><h1 style="font-size:3.5rem; letter-spacing:-2px;">Cześć, ${db.userName}!</h1><p style="margin-top:15px;">Wpisz licznik przed jazdą.</p></div>${alertsHtml}<div class="panel" style="max-width:500px; margin:0 auto; border-color:var(--success); box-shadow:0 15px 50px rgba(34,197,94,0.2);"><div class="inp-group"><input type="number" id="ds-o" class="big-inp" value="${d.odo > 0 ? d.odo : ''}" placeholder="Stan licznika"></div><button class="btn btn-success" style="margin-top:20px; font-size:1.3rem; padding:25px;" onclick="window.dStartS()">ROZPOCZNIJ PRACĘ</button></div>`;

window.dAF = () => { window.vib(); let o=window.safeVal('df-o'); let l=window.safeVal('df-l'); let v=window.safeVal('df-v'); if(o>0&&l>0&&v>0){ db.drv.odo=o; db.drv.fuel.unshift({o,l,v,isF:parseInt(document.getElementById('df-f').value),rD:new Date().toISOString()}); db.drv.exp.unshift({id:Date.now(),rD:new Date().toISOString(),d:'⛽ Tankowanie',v,ty:'f',l,odo:o,dt:new Date().toLocaleDateString()}); window.save(); window.render(); } };
window.dAE = () => { window.vib(); let v = window.safeVal('de-v'); let cEl = document.getElementById('de-c'); let c = cEl ? cEl.value : 'Wydatki'; if(!v) return window.showModal('error', 'Błąd', 'Wpisz kwotę.', '', null); let dVal = document.getElementById('de-date').value; let dObj = dVal ? new Date(dVal) : new Date(); if(dVal) dObj.setHours(12,0,0); db.drv.exp.unshift({id:Date.now(), rD:dObj.toISOString(), d:c, v, dt:dObj.toLocaleDateString('pl-PL'), ty:'e'}); window.save(); window.render(); };
window.dTransferToHomeUI = () => { window.vib(); let accs=db.home.accs.map(a=>`<option value="${a.id}">${a.n}</option>`).join(''); window.showModal('prompt','Wypłata','Wpisz kwotę do przelania:','',v=>{ if(v>0){ db.home.trans.push({id:Date.now(), type:'inc', cat:'Taxi Zysk', acc:db.home.accs[0].id, d:'Wypłata z Taxi', v:parseFloat(v), dt:new Date().toLocaleDateString(), rD:new Date().toISOString()}); window.save(); window.showModal('success','Sukces',`Przelano ${v} zł.`,'',null); } }); };
window.dExportCSV = () => { window.vib(); let c="Data,Typ,Kwota\n"; db.drv.h.forEach(x=>c+=`${x.dt},Utarg,${x.n}\n`); let b=new Blob(["\uFEFF"+c],{type:'text/csv;charset=utf-8;'}); let a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download="Taxi.csv"; a.click(); window.showModal('success','Pobrano','Plik CSV zapisany.','',null); };
window.dAddCrm = () => { window.vib(); let n = document.getElementById('dc-n').value; let ph = document.getElementById('dc-p').value; let d = window.safeVal('dc-d'); if(n) { db.drv.clients.unshift({id:Date.now(), n, ph, d, bl: false}); window.save(); window.render(); window.showModal('success','Sukces','Klient zapisany.','',null); } else { window.showModal('error','Błąd','Podaj imię klienta.','',null); } };
window.dCrmDel = (id) => { window.vib(); window.showModal('confirm', 'Uwaga!', 'Usunąć klienta?', '', res => { if(res) { db.drv.clients = db.drv.clients.filter(x=>x.id!==id); window.save(); window.render(); } }); };
window.dSaveUS = () => { window.vib(); db.userName = document.getElementById('us-name').value; db.drv.cfg.goal = window.safeVal('us-goal', 350); db.drv.cfg.defCity = document.getElementById('us-city').value; db.drv.cfg.cC = window.safeVal('us-cc'); db.drv.cfg.cType = document.getElementById('us-ctype').value; db.drv.cfg.bC = window.safeVal('us-bc'); db.drv.cfg.iC = window.safeVal('us-ic'); db.drv.cfg.tax = window.safeVal('us-tx') / 100; db.drv.cfg.cardF = window.safeVal('us-cf') / 100; let eTy = document.getElementById('us-etype').value; db.drv.cfg.eType = eTy; if(eTy === 'flat') { db.drv.cfg.eC = window.safeVal('us-ec'); db.drv.cfg.ePct = 0; } else { db.drv.cfg.eC = 0; db.drv.cfg.ePct = window.safeVal('us-epct') / 100; } let dailyCar = (db.drv.cfg.cType === 'week') ? (db.drv.cfg.cC / 7) : (db.drv.cfg.cC / 30); let dailyOther = (db.drv.cfg.eC + db.drv.cfg.bC + db.drv.cfg.iC) / 30; db.drv.cfg.fix = dailyCar + dailyOther; window.save(); window.render(); window.showModal('success', 'Zapisano!', 'Ustawienia zaktualizowane.', '', null); };

window.lmap = null; window.routeLayer = null;
window.calculateRouteAuto = async () => { window.vib(); let s = document.getElementById('dq-start').value; let e = document.getElementById('dq-end').value; if(!s || !e) return window.showModal('error', 'Błąd', 'Podaj adresy.', '', null); let dC = db.drv.cfg.defCity || 'Szczecin'; let sQ = s.includes(dC) ? s : s + ', ' + dC; let eQ = e.includes(dC) ? e : e + ', ' + dC; try { let rS = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(sQ)}`); let dS = await rS.json(); let rE = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(eQ)}`); let dE = await rE.json(); if(!dS.length || !dE.length) return window.showModal('error', 'Błąd', 'Nie znaleziono adresu.', '', null); let route = await fetch(`https://router.project-osrm.org/route/v1/driving/${dS[0].lon},${dS[0].lat};${dE[0].lon},${dE[0].lat}?overview=full&geometries=geojson`); let rData = await route.json(); dQK = rData.routes[0].distance / 1000; dQM_T = Math.round(rData.routes[0].duration / 60); document.getElementById('map-container').style.display = 'block'; if(!window.lmap) { window.lmap = L.map('map').setView([dS[0].lat, dS[0].lon], 13); L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(window.lmap); } window.lmap.invalidateSize(); if(window.routeLayer) window.lmap.removeLayer(window.routeLayer); window.routeLayer = L.geoJSON(rData.routes[0].geometry, {style:{color:'#d946ef',weight:6}}).addTo(window.lmap); window.lmap.fitBounds(window.routeLayer.getBounds(), {padding:[30,30]}); document.getElementById('res-km').innerText = dQK.toFixed(1) + ' km'; document.getElementById('res-min').innerText = dQM_T + ' min'; window.updateRoutePrice(dQK, 0); } catch(err) { window.showModal('error', 'Błąd', 'Problem z mapą.', '', null); } };
window.updateZoneSplit = () => { let slider = document.getElementById('zone-slider'); let inDist = parseFloat(slider.value); let outDist = parseFloat(slider.max) - inDist; document.getElementById('val-in').innerText = inDist.toFixed(1); document.getElementById('val-out').innerText = outDist.toFixed(1); window.updateRoutePrice(inDist, outDist); };
window.updateRoutePrice = (inDist = dQK, outDist = 0) => { let q = db.drv.q; let base = q.s + (inDist * (dQN ? q.t2 : q.t1)) + (outDist * (dQN ? q.t4 : q.t3)) + (dQM_T * (q.w / 60)); dQV = base; document.getElementById('dqt').innerText = dQV.toFixed(2) + " zł"; };
window.dQB = () => { window.vib(); if(!db.drv.sh.on) return window.showModal('error', 'Błąd', 'Rozpocznij zmianę!', '', null); if(dQV > 0) { db.drv.sh.tr.unshift({id:Date.now(), v:dQV, k:dQK.toFixed(1), m:dQM_T, s:'Mapa', p:'Gotówka'}); window.save(); window.changeTab('term'); } };
window.dSaveQC = () => { window.vib(); db.drv.q = { s:window.safeVal('dcs'), w:window.safeVal('dcw'), t1:window.safeVal('dct1'), t2:window.safeVal('dct2'), t3:window.safeVal('dct3'), t4:window.safeVal('dct4') }; window.save(); window.showModal('success', 'Zapisano', 'Taryfy zaktualizowane.', '', null); };

window.render();
</script>
</body>
</html>
